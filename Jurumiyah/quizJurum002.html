<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Quiz Al-Ajurumiyah - Level 2</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* Layar Utama */
    .main-menu {
      text-align: center;
      color: white;
      padding: 30px 16px;
    }

    .main-menu h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 4px 4px 0 #5a3d8c;
      letter-spacing: 1px;
    }

    .main-menu .level-badge {
      background: #f9ca24;
      color: #3c2f6b;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 8px 30px;
      border-radius: 40px;
      display: inline-block;
      margin: 16px 0 30px;
      box-shadow: 0 8px 0 #b68b40;
    }

    .btn-mulai {
      background: #f093fb;
      border: none;
      color: #2d1b4e;
      font-weight: 700;
      font-size: 2rem;
      padding: 18px 50px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 0 #b865d1, 0 8px 20px rgba(0,0,0,0.3);
      transition: all 0.1s ease;
      font-family: 'Poppins', sans-serif;
      width: 100%;
      max-width: 300px;
    }

    .btn-mulai:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #b865d1, 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Layar Quiz */
    .quiz-screen {
      color: white;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.2);
      padding: 12px 20px;
      border-radius: 50px;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
    }

    .quiz-header .level-small {
      background: #f9ca24;
      color: #2d1b4e;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
    }

    .quiz-header .progress {
      font-size: 1rem;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 40px;
    }

    .question-box {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px 18px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .question-text {
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 24px;
      color: #fff5e0;
      word-break: break-word;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-item {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 14px 18px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: right;
      direction: rtl;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .option-item:hover:not(.disabled-option) {
      background: rgba(255,255,255,0.35);
      border-color: #f9ca24;
    }

    .option-item.selected {
      background: #f9ca24;
      color: #2d1b4e;
      font-weight: 700;
      border-color: #f9ca24;
      box-shadow: 0 0 15px #f9ca24;
    }

    .disabled-option {
      pointer-events: none;
      opacity: 0.6;
    }

    .option-prefix {
      background: #4a2f7a;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: white;
      flex-shrink: 0;
    }

    .selected .option-prefix {
      background: #b865d1;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
    }

    /* Notifikasi */
    .notification-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .notification-card {
      background: white;
      border-radius: 40px;
      padding: 28px 20px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
      animation: pop 0.3s;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .notification-card.benar {
      background: linear-gradient(145deg, #c8e6c9, #a5d6a7);
      border: 4px solid #2e7d32;
    }

    .notification-card.salah {
      background: linear-gradient(145deg, #ffcdd2, #ef9a9a);
      border: 4px solid #b71c1c;
    }

    .notification-card.selesai {
      background: linear-gradient(145deg, #bbdefb, #90caf9);
      border: 4px solid #1565c0;
    }

    .notif-icon {
      font-size: 4rem;
      margin-bottom: 8px;
    }

    .notif-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .notif-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notif-btn {
      border: none;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 130px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2);
    }

    .notif-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .btn-next {
      background: #2e7d32;
      color: white;
    }

    .btn-ulangi {
      background: #ff9800;
      color: white;
    }

    .btn-penjelasan {
      background: #2196f3;
      color: white;
    }

    .btn-level2 {
      background: #7b1fa2;
      color: white;
    }

    .explanation-box {
      background: #fff3e0;
      border-radius: 24px;
      padding: 18px;
      margin-top: 24px;
      text-align: left;
      color: #1e3c72;
      font-size: 0.95rem;
      max-height: 300px;
      overflow-y: auto;
      border: 2px solid #ffb74d;
      direction: ltr;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- Layar Utama -->
  <div id="mainMenu" class="main-menu">
    <h1>Quiz Al-Ajurumiyah</h1>
    <div class="level-badge"><i class="fas fa-star"></i> Level 2 <i class="fas fa-star"></i></div>
    <button class="btn-mulai" id="btnMulai"><i class="fas fa-play"></i> Mulai</button>
    <div style="margin-top: 30px; font-size: 0.85rem; opacity: 0.8;">30 soal pilihan ganda • bab al-Kalam (bagian 2)</div>
  </div>

  <!-- Layar Quiz (awalnya tersembunyi) -->
  <div id="quizScreen" class="quiz-screen hidden">
    <div class="quiz-header">
      <span class="level-small"><i class="fas fa-flag"></i> Level 1</span>
      <span class="progress" id="progressIndicator">1/30</span>
    </div>

    <div class="question-box">
      <div class="question-text" id="questionText">Memuat soal...</div>
      <div class="options-container" id="optionsContainer"></div>
    </div>

    <div class="footer">— ‏باب الكلام وأقسامه ‏—</div>
  </div>
</div>

<!-- Notifikasi (popup) -->
<div id="notificationOverlay" class="notification-overlay hidden">
  <div class="notification-card" id="notificationCard">
    <div class="notif-icon" id="notifIcon">✅</div>
    <div class="notif-title" id="notifTitle">Benar</div>
    <div class="notif-buttons" id="notifButtons"></div>
    <div id="explanationArea" class="explanation-box hidden"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- DATA SOAL (30 soal berdasarkan teks lanjutan) ----------
    const questions = [
      { //1
        question: "كم عدد أقسام الكلام عند النحويين؟",
        options: ["قسمان", "ثلاثة", "أربعة", "خمسة"],
        correct: 1,
        explanation: "Analisis: Teks dengan jelas menyebutkan: 'أقسام الكلام ثلاثة'. Ini adalah pernyataan langsung dari penulis."
      },
      { //2
        question: "بأي شيء عرّف المؤلف الاسم؟",
        options: ["بحد خاص", "بالعلامة والحكم", "بالرسم", "بالاشتقاق"],
        correct: 1,
        explanation: "Analisis: Dalam teks disebutkan: 'المؤلف نظراً لكون كتابه مختصرا وللمبتدئين لم يحد الاسم بحد خاص يعني: ما حده بالرسم لكن حده بالحكم والعلامة.'"
      },
      { //3
        question: "ما الدليل على انحصار أقسام الكلام في ثلاثة عند النحويين؟",
        options: ["القرآن الكريم", "السنة النبوية", "الإجماع", "التتبع والاستقراء"],
        correct: 3,
        explanation: "Analisis: Teks menjelaskan: 'لكن للعلماء دليل على انحصار أقسامه في ثلاثة، وهو التتبع والاستقراء، يعني: أن العلماء تتبعوا كلام العرب فوجدوا أنه لا يخرج عن هذه الأقسام الثلاثة.'"
      },
      { //4
        question: "كم علامة ذكر المؤلف للاسم؟",
        options: ["ثلاث علامات", "أربع علامات", "خمس علامات", "ست علامات"],
        correct: 1,
        explanation: "Analisis: Penulis menyebutkan empat tanda: الخفض، والتنوين، ودخول الألف واللام، وحروف الخفض."
      },
      { //5
        question: "بماذا يعبر البصريون عن الخفض؟",
        options: ["الجزم", "النصب", "الجر", "الرفع"],
        correct: 2,
        explanation: "Analisis: Teks menyatakan: 'والبصريون يعبرون عن الخفض بالجر... البصري يقول: جر'."
      },
      { //6
        question: "بماذا يعبر الكوفيون عن الجر؟",
        options: ["الخفض", "النصب", "الرفع", "الجزم"],
        correct: 0,
        explanation: "Analisis: Teks menyatakan: 'الكوفي يقول: خفض، والبصري يقول: جر'."
      },
      { //7
        question: "متى يسقط التنوين والألف واللام؟",
        options: ["لا يسقطان أبداً", "يسقطان عند دخول الألف واللام", "يسقطان في حالة الرفع", "يسقطان في حالة النصب"],
        correct: 1,
        explanation: "Analisis: Ini adalah kaidah dasar dalam nahwu: tanwin dan alif lam tidak bisa berkumpul dalam satu kata. Jika ada alif lam, tanwin tidak ada."
      },
      { //8
        question: "ما تعريف الفعل عند بعض النحويين؟",
        options: ["ما دل على معنى في نفسه ولم يدل على الزمان", "ما دل على معنى في نفسه ودل بهيئته على الزمان", "ما ليس له معنى في نفسه", "ما دل على الحدث فقط"],
        correct: 1,
        explanation: "Analisis: Teks menyebutkan definisi fi'il: 'ما دل على معنى في نفسه ودل بهيئته على الزمان'."
      },
      { //9
        question: "ما تعريف الحرف عند بعض النحويين؟",
        options: ["ما دل على معنى في نفسه", "ما دل على الزمان", "ما ليس له معنى في نفسه وإنما يظهر معناه في غيره", "ما دل على الحدث والزمان"],
        correct: 2,
        explanation: "Analisis: Teks menyebutkan definisi huruf: 'الحرف ما ليس له معنى في نفسه وإنما يظهر معناه في غيره'."
      },
      { //10
        question: "مررت برجل كريم - ما علامة الاسم في كلمة كريم؟",
        options: ["التنوين", "الألف واللام", "الخفض", "دخول حرف القسم"],
        correct: 2,
        explanation: "Analisis: Dalam kalimat 'مررت برجل كريم', kata 'كريم' adalah sifat dari 'رجل' yang majrur karena didahului huruf jar 'ب'. Maka 'كريم' mengikuti 'رجل' dalam keadaan majrur, sehingga tanda isimnya adalah khafadh."
      },
      { //11
        question: "هل يجتمع التنوين والألف واللام في كلمة واحدة؟",
        options: ["نعم، يجتمعان دائماً", "لا، لا يجتمعان أبداً", "يجتمعان في بعض الحالات", "يجتمعان إذا كانت الكلمة مرفوعة"],
        correct: 1,
        explanation: "Analisis: Teks dengan tegas menyatakan: 'هل يجتمع التنوين والألف واللام؟ لا يجتمعان. لا يمكن أن يكون شيء فيه الألف واللام ويُنَوَّن أبدًا.'"
      },
      { //12
        question: "ما موقف البصريين من ال في قولنا الكتاب؟",
        options: ["يقولون هي الألف واللام", "يقولون هي ال حرفان", "يقولون هي همزة وصل فقط", "يقولون هي حرف واحد"],
        correct: 1,
        explanation: "Analisis: Teks menjelaskan: 'وحجة البصريين: أن «ال» حرفان، والكلمة إذا كانت حرفين ينطق بلفظها؛ ولهذا تقول: «من» حرف جر ولا تقول: الميم والنون حرف جر.'"
      },
      { //13
        question: "ما موقف الكوفيين من ال في قولنا الكتاب؟",
        options: ["يقولون هي ال حرفان", "يقولون هي الألف واللام", "يقولون هي لام فقط", "يقولون هي همزة قطع"],
        correct: 1,
        explanation: "Analisis: Teks menjelaskan pendapat Kufiyyin: 'والكوفيون يقولون: هذه كلمة مكونة من حرفين لكنهما حرفان هجائيان أحدهما ليس أصليا وهو الهمزة... إذن بماذا تنطق؟ تنطق باسمها نقول: الألف واللام.'"
      },
      { //14
        question: "لماذا يعتبر الكوفيون أن الهمزة في ال ليست أصلية؟",
        options: ["لأنها تكتب ولا تنطق", "لأنها همزة وصل تسقط عند الدرج", "لأنها همزة قطع تثبت دائماً", "لأنها حرف زائد"],
        correct: 1,
        explanation: "Analisis: Teks menyebutkan: 'إن الهمزة ليست أصيلة في الكلمة؛ لأن الهمزة يؤتى بها للوصل؛ ولهذا تسقط عند الدرج والاتصال.'"
      },
      { //15
        question: "ما حكم الخلاف بين البصريين والكوفيين في ال؟",
        options: ["خلاف مؤثر في المعنى", "خلاف لفظي لا يترتب عليه شيء", "خلاف في الحكم الشرعي", "خلاف في الإعراب"],
        correct: 1,
        explanation: "Analisis: Teks menyatakan: 'هذا الخلاف هل يترتب عليه شيء؟ لا يترتب عليه شيء، الخلاف لفظي.'"
      },
      { //16
        question: "قال تعالى: (وَلِمَن جَاءَ بِهِ حِمْلُ بَعِيرٍ) - كلمة بعير ما علامات الاسم فيها؟",
        options: ["الألف واللام فقط", "التنوين والخفض", "الخفض فقط", "التنوين والألف واللام"],
        correct: 1,
        explanation: "Analisis: Kata 'بعير' dalam ayat tersebut: 'حمل بعير' - 'بعير' adalah mudhaf ilaih yang majrur, dan ia memiliki tanwin. Maka tanda isimnya adalah tanwin dan khafadh."
      },
      { //17
        question: "قال تعالى: (وَاللَّيْلِ إِذَا يَغْشَىٰ) - كلمة الليل ما علامات الاسم فيها؟",
        options: ["التنوين والرفع", "الألف واللام والخفض", "الخفض فقط", "الألف واللام والتنوين"],
        correct: 1,
        explanation: "Analisis: Kata 'الليل' dalam ayat 'والليل' didahului oleh huruf qasam (waw) yang termasuk huruf jar, sehingga ia majrur. Jelas ada alif lam padanya. Maka tanda isimnya adalah alif lam dan khafadh."
      },
      { //18
        question: "إذا قال شخص: إن اجتهدت فهل هذا كلام عند النحويين؟",
        options: ["نعم، لأنه مركب", "نعم، لأنه مفيد", "لا، لأنه غير مفيد", "لا، لأنه ليس بلفظ"],
        correct: 2,
        explanation: "Analisis: Teks menjelaskan: 'ما تقول فيما إذا قال لك شخص: «إن اجتهدت هل هذا كلام أم لا؟ لا، ليس كلاما؛ لأنه غير مفيد.' Ini adalah kalimat syarat yang belum sempurna."
      },
      { //19
        question: "إذا أشار النبي ﷺ إلى الصحابة بالجلوس في الصلاة، فهل هذا كلام عند النحويين؟",
        options: ["نعم، لأنه مفيد", "نعم، لأنه مقصود", "لا، لأنه ليس بلفظ", "لا، لأنه غير مركب"],
        correct: 2,
        explanation: "Analisis: Teks menjelaskan: 'أشار النبي ﷺ... هل هذا كلام؟ لا ؛ لأن الكلام لا بد أن يكون باللفظ، أما بالإشارة وإن أفاد فليس بكلام.'"
      },
      { //20
        question: "ما الفرق بين إن التي هي حرف توكيد وإن التي هي أمر من الأنين؟",
        options: ["كلاهما حرف", "الأولى حرف والثانية اسم فعل", "الأولى اسم والثانية حرف", "كلاهما اسم"],
        correct: 1,
        explanation: "Analisis: Teks membahas: 'هل هذا صحيح؟ لا «إن» إن كان هي أمر من الأنين فهي كلام؛ وإن كان حرف توكيد فليست كلامًا.' 'إن' yang berarti 'diam' (perintah) adalah اسم فعل, sedangkan 'إن' yang berarti 'sesungguhnya' adalah huruf."
      },
      { //21
        question: "ما معنى حرف جاء لمعنى في تعريف الحرف؟",
        options: ["أن الحرف له معنى مستقل", "أن الحرف له معنى يظهر في غيره", "أن الحرف لا معنى له إطلاقاً", "أن الحرف يدل على الزمان"],
        correct: 1,
        explanation: "Analisis: Penulis mendefinisikan huruf sebagai 'حرف جاء لمعنى', dan dalam teks dijelaskan bahwa الحرف ما ليس له معنى في نفسه وإنما يظهر معناه في غيره. Maksudnya, huruf memiliki makna tetapi tidak sempurna kecuali bersama kata lain."
      },
      { //22
        question: "إذا تكلم شخص غير عربي بخطبة كاملة بلغته، فهل تعتبر كلاماً عند النحويين؟",
        options: ["نعم، لأنه مفيد", "نعم، لأنه لفظ", "لا، لأنه ليس بالوضع العربي", "لا، لأنه غير مركب"],
        correct: 2,
        explanation: "Analisis: Teks menjelaskan: 'ما تقول في رجل غير عربي قام أمامنا وخطب خطبة كاملة. هل هذا كلام أم غير كلام؟ غير كلام. لماذا؟ لأنه ليس بالوضع العربي فلا يسمى كلاما عند النحويين.'"
      },
      { //23

        options: ["لأن النحو علم ديني", "لأن النحو علم وضعي مبني على الاستقراء", "لأن النحو علم نقلي", "لأن النحو علم عقلي بحت"],
        correct: 1,
        explanation: "Analisis: Teks menjelaskan bahwa dalil pembagian tiga ini bukan dari Al-Qur'an, Sunnah, Ijma', atau Qiyas karena itu untuk hukum syar'i. Untuk nahwu, dalilnya adalah التتبع والاستقراء (penelitian dan induksi) terhadap kalam Arab."
      },
      { //24
        question: "ما الفرق بين تعريف الاسم عند النحويين وبين تعريفه بالعلامات كما فعل المؤلف؟",
        options: ["التعريف بالحد أدق وأسهل للمبتدئ", "التعريف بالعلامات أسهل للمبتدئ وأنفع", "التعريف بالحد هو الوحيد الصحيح", "لا فرق بينهما"],
        correct: 1,
        explanation: "Analisis: Teks menyatakan bahwa definisi dengan batasan (الحد) sulit bagi pemula dan faedahnya sedikit. Maka pengarang memilih definisi dengan tanda-tanda (العلامات) karena lebih mudah dan bermanfaat."
      },
      { //25
        question: "لماذا لم يحد المؤلف الاسم بحد خاص (مثل: ما دل على معنى في نفسه)؟",
        options: ["لأنه لا يعرف الحدود", "لأن كتابه مختصر وللمبتدئين", "لأنه يخالف الجمهور", "لأنه لا يرى فائدة من الحدود"],
        correct: 1,
        explanation: "Analisis: Teks menyebutkan: 'والمؤلف نظراً لكون كتابه مختصرا وللمبتدئين لم يحد الاسم بحد خاص... لكن هذا في الحقيقة مع صعوبته على المبتدئ فائدته قليلة.'"
      },
      { //26
        question: "كيف نرد على من يقول: إن اسم الفعل (مثل صه) يخرج عن كونه اسماً؟",
        options: ["اسم الفعل ليس اسماً حقيقياً", "اسم الفعل يدخل في باب الحروف", "الاسم يشمل الاسم الخالص واسم الفعل", "اسم الفعل من الأفعال"],

        explanation: "Analisis: Teks menjelaskan: 'وإذا قلت: «صة» هو اسم فعل لا يخرج عن كونه اسما، فالاسم يشمل الاسم الخالص، واسم الفعل.' Jadi اسم الفعل tetap termasuk dalam kategori isim."

      { //28
        question: "إذا قلنا: الرجلُ قائمٌ فكم علامة اسم في كلمة الرجل؟",
        options: ["علامة واحدة: الألف واللام", "علامتان: الألف واللام والرفع", "ثلاث علامات: الألف واللام والرفع والتنوين", "الرفع ليس علامة على الاسم"],

        explanation: "Analisis: Kata 'الرجل' memiliki alif lam sebagai tanda isim yang jelas. Meskipun rafa' juga menunjukkan ia isim dalam konteks ini, namun rafa' bukan termasuk empat tanda yang disebut penulis. Jadi jawaban yang tepat adalah satu tanda (alif lam)."

        correct: 1,
        explanation: "Analisis: Teks menyebutkan: 'هل يمكن أن تجتمع ثلاثة من الأربع؟ يمكن أن يجتمع ثلاث من الأربع.' Contohnya: kata setelah huruf jar dan bertanwin (maka memiliki tanda: khafadh, tanwin, dan kemasukan huruf jar). Atau kata yang memiliki alif lam dan khafadh (tanda: alif lam, khafadh, kemasukan huruf jar). Tanwin dan alif lam tidak bisa bersama, jadi maksimal tiga dari empat tanda."
      },
      { //30
        question: "ما حجة البصريين في اعتبار ال حرفين (ألف ولام)؟",
        options: ["لأنها تكتب هكذا في المصحف", "لأن الكلمة إذا كانت حرفين ينطق بلفظها مثل من و عن", "لأن الهمزة أصلية", "لأنها لا تسقط أبداً"],
        correct: 1,
        explanation: "Analisis: Teks menjelaskan hujjah Bashriyyin: 'وحجة البصريين: أن «ال» حرفان، والكلمة إذا كانت حرفين ينطق بلفظها؛ ولهذا تقول: «من» حرف جر ولا تقول: الميم والنون حرف جر.' Ini adalah analogi mereka dengan huruf-huruf lain yang terdiri dari dua huruf."

    // Elemen DOM
    const mainMenu = document.getElementById('mainMenu');
    const quizScreen = document.getElementById('quizScreen');
    const btnMulai = document.getElementById('btnMulai');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const progressIndicator = document.getElementById('progressIndicator');
    const notificationOverlay = document.getElementById('notificationOverlay');
    const notificationCard = document.getElementById('notificationCard');
    const notifIcon = document.getElementById('notifIcon');
    const notifTitle = document.getElementById('notifTitle');
    const notifButtons = document.getElementById('notifButtons');
    const explanationArea = document.getElementById('explanationArea');

    // State
    let currentIndex = 0;
    let answerSubmitted = false;

    // Fungsi tampilkan soal
    function loadQuestion() {
      const q = questions[currentIndex];
      questionText.textContent = q.question;
      let optionsHtml = '';
      q.options.forEach((opt, idx) => {
        optionsHtml += `
          <div class="option-item" data-opt-index="${idx}">
            <span class="option-prefix">${String.fromCharCode(65+idx)}</span>
            <span style="flex:1">${opt}</span>
          </div>
        `;
      });
      optionsContainer.innerHTML = optionsHtml;
      progressIndicator.textContent = `${currentIndex+1}/${questions.length}`;
      answerSubmitted = false;
    }

    // Event listener untuk memilih opsi (langsung proses)
    optionsContainer.addEventListener('click', (e) => {
      const optDiv = e.target.closest('.option-item');
      if (!optDiv) return;
      if (answerSubmitted) return;

      const idx = optDiv.dataset.optIndex;
      if (idx === undefined) return;

      answerSubmitted = true;
      const selectedIdx = parseInt(idx);
      const q = questions[currentIndex];
      const isCorrect = (selectedIdx === q.correct);

      document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));

      if (isCorrect) {
        showCorrectNotification();
      } else {
        showWrongNotification();
      }
    });

    // Notifikasi benar
    function showCorrectNotification() {
      notificationCard.className = 'notification-card benar';
      notifIcon.innerHTML = '✅';
      notifTitle.textContent = 'Benar!';
      notifButtons.innerHTML = `<button class="notif-btn btn-next" id="btnNext"><i class="fas fa-arrow-right"></i> Soal Berikutnya</button>`;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnNext').addEventListener('click', () => {
        hideNotification();
        moveToNextQuestion();
      });
    }

    // Notifikasi salah
    function showWrongNotification() {
      notificationCard.className = 'notification-card salah';
      notifIcon.innerHTML = '❌';
      notifTitle.textContent = 'Salah';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangi"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-penjelasan" id="btnPenjelasan"><i class="fas fa-info-circle"></i> Penjelasan</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangi').addEventListener('click', () => {
        hideNotification();
        resetForRetry();
      });

      document.getElementById('btnPenjelasan').addEventListener('click', () => {
        if (explanationArea.classList.contains('hidden')) {
          explanationArea.innerHTML = `<strong>Analisis:</strong> ${questions[currentIndex].explanation}`;
          explanationArea.classList.remove('hidden');
        } else {
          explanationArea.classList.add('hidden');
        }
      });
    }

    // Notifikasi selesai semua soal
    function showCompletionNotification() {
      notificationCard.className = 'notification-card selesai';
      notifIcon.innerHTML = '🏆';
      notifTitle.textContent = 'Alhamdulillah!';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangiSemua"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-level2" id="btnLevel2"><i class="fas fa-star"></i> Level 2</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangiSemua').addEventListener('click', () => {
        hideNotification();
        currentIndex = 0;
        mainMenu.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        loadQuestion();
      });

      document.getElementById('btnLevel2').addEventListener('click', () => {
        hideNotification();
        alert('Level 2 sedang dalam pengembangan. Silakan ulangi Level 1.');
        mainMenu.classList.remove('hidden');
        quizScreen.classList.add('hidden');
        currentIndex = 0;
      });
    }

    function showNotification() {
      notificationOverlay.classList.remove('hidden');
    }

    function hideNotification() {
      notificationOverlay.classList.add('hidden');
    }

    function resetForRetry() {
      answerSubmitted = false;
      document.querySelectorAll('.option-item').forEach(el => el.classList.remove('disabled-option'));
    }

    function moveToNextQuestion() {
      if (currentIndex + 1 < questions.length) {
        currentIndex++;
        loadQuestion();
      } else {
        quizScreen.classList.add('hidden');
        showCompletionNotification();
      }
    }

    // Mulai quiz
    btnMulai.addEventListener('click', () => {
      mainMenu.classList.add('hidden');
      quizScreen.classList.remove('hidden');
      currentIndex = 0;
      loadQuestion();
    });

    // Klik di luar notifikasi tidak melakukan apa-apa
    notificationOverlay.addEventListener('click', (e) => {
      if (e.target === notificationOverlay) {
        // biarkan user memilih tombol
      }
    });
  })();
</script>

</html>
