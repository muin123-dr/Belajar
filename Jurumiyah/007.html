<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Quiz Al-Ajurumiyah - المعربات وأنواع الأفعال</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a; /* hitam pekat */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .main-menu {
      text-align: center;
      color: white;
      padding: 30px 16px;
    }

    .main-menu h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 4px 4px 0 #b8860b;
      letter-spacing: 1px;
      color: #fff;
    }

    .main-menu .level-badge {
      background: #FFD700;
      color: #000;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 8px 30px;
      border-radius: 40px;
      display: inline-block;
      margin: 16px 0 30px;
      box-shadow: 0 8px 0 #b8860b;
    }

    .btn-mulai {
      background: #FFD700;
      border: none;
      color: #000;
      font-weight: 700;
      font-size: 2rem;
      padding: 18px 50px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 0 #b8860b, 0 8px 20px rgba(0, 0, 0, 0.5);
      transition: all 0.1s ease;
      font-family: 'Poppins', sans-serif;
      width: 100%;
      max-width: 300px;
    }

    .btn-mulai:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #b8860b, 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    .quiz-screen {
      color: white;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 20px;
      border-radius: 50px;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
      border: 1px solid #FFD700;
    }

    .quiz-header .level-small {
      background: #FFD700;
      color: #000;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
    }

    .quiz-header .progress {
      font-size: 1rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 16px;
      border-radius: 40px;
      color: #FFD700;
      border: 1px solid #FFD700;
    }

    .nav-grid-btn {
      background: rgba(255, 215, 0, 0.2);
      border: 1px solid #FFD700;
      color: #FFD700;
      font-size: 1.2rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-grid-btn:hover {
      background: rgba(255, 215, 0, 0.4);
    }

    .question-box {
      background: rgba(30, 30, 30, 0.95);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px 18px;
      margin-bottom: 20px;
      border: 1px solid #FFD700;
    }

    .question-text {
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 24px;
      color: #FFD700;
      word-break: break-word;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-item {
      background: rgba(50, 50, 50, 0.9);
      border: 2px solid #FFD700;
      border-radius: 50px;
      padding: 14px 18px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: right;
      direction: rtl;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .option-item:hover:not(.disabled-option) {
      background: rgba(255, 215, 0, 0.3);
      border-color: #FFD700;
    }

    .option-item.selected {
      background: #FFD700;
      color: #000;
      font-weight: 700;
      border-color: #FFD700;
      box-shadow: 0 0 15px #FFD700;
    }

    .disabled-option {
      pointer-events: none;
      opacity: 0.6;
    }

    .option-prefix {
      background: #b8860b;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: #000;
      flex-shrink: 0;
    }

    .selected .option-prefix {
      background: #000;
      color: #FFD700;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #FFD700;
      font-size: 0.9rem;
    }

    .notification-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .notification-card {
      background: #1e1e1e;
      border-radius: 40px;
      padding: 28px 20px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8);
      animation: pop 0.3s;
      border: 2px solid #FFD700;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .notification-card.benar {
      background: #1e3a1e;
      border: 4px solid #FFD700;
    }

    .notification-card.salah {
      background: #3a1e1e;
      border: 4px solid #ff8a80;
    }

    .notification-card.selesai {
      background: #1e1e3a;
      border: 4px solid #FFD700;
    }

    .notif-icon {
      font-size: 4rem;
      margin-bottom: 8px;
    }

    .notif-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #FFD700;
    }

    .notif-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notif-btn {
      border: none;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 130px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.5);
    }

    .notif-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.5);
    }

    .btn-next {
      background: #FFD700;
      color: #000;
    }

    .btn-ulangi {
      background: #ff9800;
      color: #000;
    }

    .btn-penjelasan {
      background: #2196f3;
      color: #fff;
    }

    .explanation-box {
      background: #2a2a2a;
      border-radius: 24px;
      padding: 18px;
      margin-top: 24px;
      text-align: left;
      color: #FFD700;
      font-size: 0.95rem;
      max-height: 300px;
      overflow-y: auto;
      border: 2px solid #FFD700;
      direction: ltr;
    }

    .hidden {
      display: none !important;
    }

    .nav-panel-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .nav-panel {
      background: #1a1a1a;
      border-radius: 40px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      border: 2px solid #FFD700;
      box-shadow: 0 20px 40px black;
    }

    .nav-panel h3 {
      color: #FFD700;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav-item {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #FFD700;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-item.answered {
      background: #b8860b;
      border-color: #FFD700;
      color: #000;
    }

    .nav-item.unanswered {
      background: #4a1e1e;
      border-color: #ff8a80;
    }

    .nav-item:hover {
      transform: scale(1.05);
      border-color: #FFD700;
      background: #FFD700;
      color: #000;
    }

    .btn-tutup-panel {
      background: #FFD700;
      border: none;
      color: #000;
      font-weight: 700;
      padding: 12px 30px;
      border-radius: 40px;
      width: 100%;
      cursor: pointer;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div id="mainMenu" class="main-menu">
    <h1>Quiz Al-Ajurumiyah</h1>
    <div class="level-badge"><i class="fas fa-star"></i> المعربات وأنواع الأفعال <i class="fas fa-star"></i></div>
    <button class="btn-mulai" id="btnMulai"><i class="fas fa-play"></i> Mulai</button>
    <div style="margin-top: 30px; font-size: 0.85rem; opacity: 0.8;">60 soal pilihan ganda • berdasarkan penjelasan Ibnu Utsaimin</div>
  </div>

  <div id="quizScreen" class="quiz-screen hidden">
    <div class="quiz-header">
      <span class="level-small"><i class="fas fa-flag"></i> المعربات والأفعال</span>
      <span class="progress" id="progressIndicator">1/60</span>
      <button class="nav-grid-btn" id="openNavGrid"><i class="fas fa-th"></i></button>
    </div>
    <div class="question-box">
      <div class="question-text" id="questionText">Memuat soal...</div>
      <div class="options-container" id="optionsContainer"></div>
    </div>
    <div class="footer">— ‏المعربات وأنواع الأفعال - شرح ابن عثيمين ‏—</div>
  </div>
</div>

<div id="navPanelOverlay" class="nav-panel-overlay hidden">
  <div class="nav-panel">
    <h3><i class="fas fa-list"></i> Pilih Soal</h3>
    <div class="nav-grid" id="navGrid"></div>
    <button class="btn-tutup-panel" id="closeNavPanel"><i class="fas fa-times"></i> Tutup</button>
  </div>
</div>

<div id="notificationOverlay" class="notification-overlay hidden">
  <div class="notification-card" id="notificationCard">
    <div class="notif-icon" id="notifIcon">✅</div>
    <div class="notif-title" id="notifTitle">Benar</div>
    <div class="notif-buttons" id="notifButtons"></div>
    <div id="explanationArea" class="explanation-box hidden"></div>
  </div>
</div>

<script>
  (function() {
    // 60 SOAL - المعربات وأنواع الأفعال (20 mudah, 20 sedang, 20 sulit)
    const questions = [
      // ========== SOAL MUDAH (1-20) ==========
      {
        question: "كم قسمًا تنقسم المعربات؟",
        options: ["ثلاثة أقسام", "أربعة أقسام", "قسمان", "خمسة أقسام"],
        correct: 2,
        explanation: "نص المؤلف على أن المعربات قسمان: قسم يعرب بالحركات، وقسم يعرب بالحروف. (Penulis menjelaskan bahwa kata-kata yang menerima i'rab terbagi menjadi dua bagian: bagian yang dii'rab dengan harakat dan bagian yang dii'rab dengan huruf.)"
      },
      {
        question: "ما هي الحركات التي يُعرب بها القسم الأول؟",
        options: ["الفتحة والضمة والكسرة والسكون", "الفتحة والضمة والكسرة فقط", "الألف والواو والياء", "الفتحة والضمة فقط"],
        correct: 0,
        explanation: "الحركات هي الفتحة والضمة والكسرة، والسكون ليس حركة لكنه علامة جزم. (Harakat adalah fathah, dhammah, dan kasrah, sedangkan sukun bukan harakat tetapi tanda jazm.)"
      },
      {
        question: "كم نوعًا يعرب بالحركات؟",
        options: ["ثلاثة أنواع", "أربعة أنواع", "خمسة أنواع", "نوعان"],
        correct: 1,
        explanation: "الذي يعرب بالحركات أربعة أنواع: الاسم المفرد، جمع التكسير، جمع المؤنث السالم، الفعل المضارع الذي لم يتصل بآخره شيء. (Yang dii'rab dengan harakat ada empat jenis: isim mufrad, jamak taksir, jamak mu'annats salim, dan fi'il mudhari' yang tidak bertemu sesuatu di akhirnya.)"
      },
      {
        question: "بماذا يرفع الاسم المفرد؟",
        options: ["بالفتحة", "بالضمة", "بالكسرة", "بالسكون"],
        correct: 1,
        explanation: "الاسم المفرد يرفع بالضمة، وينصب بالفتحة، ويجر بالكسرة. (Isim mufrad diangkat dengan dhammah, dinashab dengan fathah, dan dijarr dengan kasrah.)"
      },
      {
        question: "بماذا ينصب جمع المؤنث السالم؟",
        options: ["بالفتحة", "بالضمة", "بالكسرة", "بالياء"],
        correct: 2,
        explanation: "خرج جمع المؤنث السالم عن الأصل في حالة النصب، فينصب بالكسرة نيابة عن الفتحة. (Jamak mu'annats salim menyimpang dari asal dalam hal nashab, yaitu dinashab dengan kasrah sebagai pengganti fathah.)"
      },
      {
        question: "كم نوعًا يعرب بالحروف؟",
        options: ["ثلاثة أنواع", "أربعة أنواع", "خمسة أنواع", "نوعان"],
        correct: 1,
        explanation: "الذي يعرب بالحروف أربعة أنواع: التثنية، جمع المذكر السالم، الأسماء الخمسة، الأفعال الخمسة. (Yang dii'rab dengan huruf ada empat jenis: mutsanna, jamak mudzakkar salim, asmaul khamsah, dan af'alul khamsah.)"
      },
      {
        question: "بماذا ترفع التثنية؟",
        options: ["بالواو", "بالياء", "بالألف", "بالنون"],
        correct: 2,
        explanation: "التثنية ترفع بالألف نيابة عن الضمة، وتنصب وتخفض بالياء. (Mutsanna diangkat dengan alif sebagai pengganti dhammah, dan dinashab serta dijarr dengan ya'.)"
      },
      {
        question: "بماذا يرفع جمع المذكر السالم؟",
        options: ["بالألف", "بالياء", "بالواو", "بالنون"],
        correct: 2,
        explanation: "جمع المذكر السالم يرفع بالواو نيابة عن الضمة، وينصب ويخفض بالياء. (Jamak mudzakkar salim diangkat dengan wawu sebagai pengganti dhammah, dan dinashab serta dijarr dengan ya'.)"
      },
      {
        question: "كم عدد الأسماء الخمسة؟",
        options: ["ثلاثة", "أربعة", "خمسة", "ستة"],
        correct: 2,
        explanation: "الأسماء الخمسة هي: أب، أخ، حم، فو، ذو (مال). (Asmaul khamsah ada lima: ab, akh, ham, fu, dzu.)"
      },
      {
        question: "بماذا تنصب الأسماء الخمسة؟",
        options: ["بالواو", "بالألف", "بالياء", "بالفتحة"],
        correct: 1,
        explanation: "الأسماء الخمسة ترفع بالواو، وتنصب بالألف، وتخفض بالياء. (Asmaul khamsah diangkat dengan wawu, dinashab dengan alif, dan dijarr dengan ya'.)"
      },
      {
        question: "ما هي الأفعال الخمسة؟",
        options: ["يفعل، تفعل، نفعل، أفعل، فعل", "يفعلان، تفعلان، يفعلون، تفعلون، تفعلين", "فعل، يفعل، افعل، ماضٍ، مضارع", "ضرب، يضرب، اضرب، مضروب، ضارب"],
        correct: 1,
        explanation: "الأفعال الخمسة هي كل فعل مضارع اتصل به ألف اثنين أو واو جماعة أو ياء مخاطبة. (Af'alul khamsah adalah setiap fi'il mudhari' yang bertemu dengan alif itsnain, wawu jama'ah, atau ya' mukhathabah.)"
      },
      {
        question: "بماذا ترفع الأفعال الخمسة؟",
        options: ["بالضمة", "بالألف", "بالواو", "بثبوت النون"],
        correct: 3,
        explanation: "الأفعال الخمسة ترفع بثبوت النون، وتنصب وتجزم بحذفها. (Af'alul khamsah diangkat dengan tetapnya nun, dan dinashab serta dijazm dengan membuangnya.)"
      },
      {
        question: "كم أنواع الأفعال؟",
        options: ["نوعان", "ثلاثة أنواع", "أربعة أنواع", "خمسة أنواع"],
        correct: 1,
        explanation: "الأفعال ثلاثة: ماضٍ، ومضارع، وأمر. (Fi'il ada tiga: madhi, mudhari', dan amr.)"
      },
      {
        question: "ما هو الفعل الماضي؟",
        options: ["ما دل على زمن حاضر", "ما دل على زمن مستقبل", "ما دل بهيئته على زمن مضى", "ما دل على الأمر"],
        correct: 2,
        explanation: "الماضي هو ما دل بهيئته على زمن مضى، مثل: ضرب. (Madhi adalah fi'il yang dengan bentuknya menunjukkan waktu lampau, contoh: dharaba.)"
      },
      {
        question: "ما هو الفعل المضارع؟",
        options: ["ما دل على زمن مضى", "ما دل على حاضر أو مستقبل", "ما دل على الأمر", "ما دل على النهي"],
        correct: 1,
        explanation: "المضارع ما دل على حاضر أو مستقبل، مثل: يضرب. (Mudhari' adalah fi'il yang menunjukkan waktu sekarang atau akan datang, contoh: yadhribu.)"
      },
      {
        question: "ما هو فعل الأمر؟",
        options: ["ما دل على زمن مضى", "ما دل على حاضر", "ما دل على مستقبل", "ما دل على الماضي"],
        correct: 2,
        explanation: "الأمر ما دل على مستقبل، مثل: اضرب. (Amr adalah fi'il yang menunjukkan waktu akan datang (perintah), contoh: idhrib.)"
      },
      {
        question: "بماذا يبنى الفعل الماضي؟",
        options: ["على السكون", "على الفتح", "على الضم", "على الكسر"],
        correct: 1,
        explanation: "الماضي مبني على الفتح أبدًا، مثل: ضربَ. (Madhi selalu dibangun di atas fathah, contoh: dharaba.)"
      },
      {
        question: "ما هي الزوائد الأربع التي تبدأ بها الأفعال المضارعة؟",
        options: ["ألف، باء، تاء، ثاء", "أنيتُ (الهمزة، النون، الياء، التاء)", "واو، فاء، ميم، نون", "سين، سوف، قد، لم"],
        correct: 1,
        explanation: "يجمعها قولك \"أنيتُ\": الهمزة، النون، الياء، التاء. (Huruf-huruf tersebut dikumpulkan dalam kata \"anîtu\": hamzah, nun, ya', ta'.)"
      },
      {
        question: "هل الفعل المضارع مرفوع دائمًا؟",
        options: ["نعم، مرفوع أبدًا حتى يدخل عليه ناصب أو جازم", "لا، قد يكون مبنياً", "دائمًا منصوب", "دائمًا مجزوم"],
        correct: 0,
        explanation: "قال المؤلف: \"وهو مرفوع أبدًا\" أي حتى يدخل عليه ناصب أو جازم. (Penulis berkata: \"Dia selalu marfu'\" sampai ada 'amil nashab atau jazm yang mempengaruhinya.)"
      },
      {
        question: "بماذا يجزم الفعل المضارع المعتل الآخر؟",

        explanation: "الفعل المضارع الذي لم يتصل بآخره شيء أي لم يتصل به ضمير رفع متحرك ولا نون توكيد ولا نون نسوة. (Fi'il mudhari' yang tidak bertemu sesuatu di akhirnya maksudnya tidak bertemu dhamir rafa' mutaharrik, nun taukid, atau nun niswah.)"
      },
      {
        question: "\"الزيدان\" ما إعرابها إذا وقعت مبتدأ؟",
        options: ["مرفوع بالضمة", "مرفوع بالألف نيابة عن الضمة", "مرفوع بالواو", "منصوب بالياء"],
        correct: 1,
        explanation: "\"الزيدان\" مثنى، يرفع بالألف نيابة عن الضمة. (Az-Zaidani adalah mutsanna, diangkat dengan alif.)"
      },
      {
        question: "\"مررت بالزيدين\" ما علامة الجر في \"الزيدين\"؟",
        options: ["الكسرة", "الفتحة", "الياء نيابة عن الكسرة", "الألف"],
        correct: 2,
        explanation: "\"الزيدين\" مثنى مجرور بالباء، وعلامة جره الياء نيابة عن الكسرة. (Az-Zaidaini adalah mutsanna majrur, tanda jarnya ya'.)"
      },
      {
        question: "\"إن أباك رجل فاضل\" لماذا نصبت \"أباك\"؟",
        options: ["لأنها مفعول به", "لأنها اسم إن منصوب بالألف", "لأنها خبر إن", "لأنها مضاف إليه"],
        correct: 1,
        explanation: "\"أباك\" من الأسماء الخمسة، وهي اسم إن منصوب وعلامة نصبه الألف. (Abaka termasuk asmaul khamsah, isim inna dinashab dengan alif.)"
      },
      {
        question: "\"جاءني ذو علمٍ\" ما إعراب \"ذو\"؟",
        options: ["مرفوع بالضمة", "مرفوع بالواو نيابة عن الضمة", "منصوب بالألف", "مجرور بالياء"],
        correct: 1,
        explanation: "\"ذو\" من الأسماء الخمسة بمعنى صاحب، وهي مرفوعة على أنها فاعل، وعلامة رفعها الواو. (Dzu termasuk asmaul khamsah, marfu' dengan wawu.)"
      },
      {
        question: "\"المسلمون خير أمة\" ما إعراب \"المسلمون\"؟",
        options: ["مبتدأ مرفوع بالضمة", "مبتدأ مرفوع بالواو نيابة عن الضمة", "فاعل مرفوع بالواو", "خبر مرفوع بالواو"],
        correct: 1,
        explanation: "\"المسلمون\" جمع مذكر سالم، مرفوع بالواو نيابة عن الضمة على أنه مبتدأ. (Al-Muslimuuna jamak mudzakkar salim, marfu' dengan wawu sebagai mubtada'.)"
      },
      {
        question: "\"رأيت المسلمين في المسجد\" ما إعراب \"المسلمين\"؟",
        options: ["مفعول به منصوب بالفتحة", "مفعول به منصوب بالياء نيابة عن الفتحة", "مجرور بالياء", "مرفوع بالواو"],
        correct: 1,
        explanation: "\"المسلمين\" جمع مذكر سالم، منصوب بالياء نيابة عن الفتحة على أنه مفعول به. (Al-Muslimiina jamak mudzakkar salim, dinashab dengan ya' sebagai maf'ul bih.)"
      },
      {
        question: "\"لم يكرم الرجلان الضيفين\" ما إعراب \"يكرم\"؟",
        options: ["فعل مضارع مرفوع بالضمة", "فعل مضارع مجزوم بحذف النون", "فعل مضارع منصوب بالفتحة", "فعل مضارع مبني"],
        correct: 1,
        explanation: "\"يكرم\" هنا في الأصل \"يكرمان\" من الأفعال الخمسة، فلما دخلت عليه \"لم\" الجازمة حذفت النون فصار \"يكرما\"، ثم حذفت الألف للتخفيف. (Asalnya yukrimani, ketika lam masuk, nun dibuang menjadi yukrimaa, kemudian alif dibuang untuk meringankan.)"
      },
      {
        question: "\"والله لأكرمنَّ المحتاج\" ما إعراب \"أكرمنَّ\"؟",
        options: ["فعل مضارع مرفوع بالضمة", "فعل مضارع مبني على الفتح لاتصاله بنون التوكيد الثقيلة", "فعل مضارع مجزوم بالسكون", "فعل أمر مبني"],
        correct: 1,
        explanation: "\"أكرمنَّ\" فعل مضارع اتصلت به نون التوكيد الثقيلة، فيبنى على الفتح. (Ukarimanna adalah fi'il mudhari' yang bertemu nun taukid tsaqilah, maka dibangun di atas fathah.)"
      }
    ];

    // Elemen DOM
    const mainMenu = document.getElementById('mainMenu');
    const quizScreen = document.getElementById('quizScreen');
    const btnMulai = document.getElementById('btnMulai');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const progressIndicator = document.getElementById('progressIndicator');
    const notificationOverlay = document.getElementById('notificationOverlay');
    const notificationCard = document.getElementById('notificationCard');
    const notifIcon = document.getElementById('notifIcon');
    const notifTitle = document.getElementById('notifTitle');
    const notifButtons = document.getElementById('notifButtons');
    const explanationArea = document.getElementById('explanationArea');
    const openNavGrid = document.getElementById('openNavGrid');
    const navPanelOverlay = document.getElementById('navPanelOverlay');
    const navGrid = document.getElementById('navGrid');
    const closeNavPanel = document.getElementById('closeNavPanel');

    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(-1);
    let answerSubmitted = false;

    function saveAnswer(index, selectedIdx) {
      userAnswers[index] = selectedIdx;
    }

    function loadQuestion() {
      const q = questions[currentIndex];
      questionText.textContent = q.question;
      let optionsHtml = '';
      q.options.forEach((opt, idx) => {
        const selectedClass = (userAnswers[currentIndex] === idx) ? ' selected' : '';
        optionsHtml += `
          <div class="option-item${selectedClass}" data-opt-index="${idx}">
            <span class="option-prefix">${String.fromCharCode(65+idx)}</span>
            <span style="flex:1">${opt}</span>
          </div>
        `;
      });
      optionsContainer.innerHTML = optionsHtml;
      progressIndicator.textContent = `${currentIndex+1}/${questions.length}`;

      if (userAnswers[currentIndex] !== -1) {
        document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));
        answerSubmitted = true;
      } else {
        answerSubmitted = false;
      }
    }

    optionsContainer.addEventListener('click', (e) => {
      const optDiv = e.target.closest('.option-item');
      if (!optDiv) return;
      if (answerSubmitted) return;

      const idx = optDiv.dataset.optIndex;
      if (idx === undefined) return;

      answerSubmitted = true;
      const selectedIdx = parseInt(idx);
      const q = questions[currentIndex];
      const isCorrect = (selectedIdx === q.correct);

      saveAnswer(currentIndex, selectedIdx);
      document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));
      optDiv.classList.add('selected');

      if (isCorrect) {
        showCorrectNotification();
      } else {
        showWrongNotification();
      }
    });

    function showCorrectNotification() {
      notificationCard.className = 'notification-card benar';
      notifIcon.innerHTML = '✅';
      notifTitle.textContent = 'Benar!';
      notifButtons.innerHTML = `<button class="notif-btn btn-next" id="btnNext"><i class="fas fa-arrow-right"></i> Soal Berikutnya</button>`;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnNext').addEventListener('click', () => {
        hideNotification();
        moveToNextQuestion();
      });
    }

    function showWrongNotification() {
      notificationCard.className = 'notification-card salah';
      notifIcon.innerHTML = '❌';
      notifTitle.textContent = 'Salah';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangi"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-penjelasan" id="btnPenjelasan"><i class="fas fa-info-circle"></i> Penjelasan</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangi').addEventListener('click', () => {
        hideNotification();
        resetForRetry();
      });

      document.getElementById('btnPenjelasan').addEventListener('click', () => {
        if (explanationArea.classList.contains('hidden')) {
          explanationArea.innerHTML = `<strong>Analisis:</strong> ${questions[currentIndex].explanation}`;
          explanationArea.classList.remove('hidden');
        } else {
          explanationArea.classList.add('hidden');
        }
      });
    }

    function showCompletionNotification() {
      notificationCard.className = 'notification-card selesai';
      notifIcon.innerHTML = '🏆';
      notifTitle.textContent = 'Alhamdulillah sudah selesai';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangiSemua"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-level2" id="btnPelajaranBerikutnya"><i class="fas fa-arrow-right"></i> Pelajaran Berikutnya</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangiSemua').addEventListener('click', () => {
        hideNotification();
        currentIndex = 0;
        userAnswers.fill(-1);
        mainMenu.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        loadQuestion();
      });

      document.getElementById('btnPelajaranBerikutnya').addEventListener('click', () => {
        window.location.href = 'https://muin123-dr.github.io/Belajar/Jurumiyah/008.html';
      });
    }

    function showNotification() {
      notificationOverlay.classList.remove('hidden');
    }

    function hideNotification() {
      notificationOverlay.classList.add('hidden');
    }

    function resetForRetry() {
      userAnswers[currentIndex] = -1;
      answerSubmitted = false;
      loadQuestion();
    }

    function moveToNextQuestion() {
      if (currentIndex + 1 < questions.length) {
        currentIndex++;
        loadQuestion();
      } else {
        quizScreen.classList.add('hidden');
        showCompletionNotification();
      }
    }

    function openNavPanel() {
      let gridHtml = '';
      for (let i = 0; i < questions.length; i++) {
        const answered = userAnswers[i] !== -1;
        gridHtml += `<div class="nav-item ${answered ? 'answered' : 'unanswered'}" data-q-index="${i}">${i+1}</div>`;
      }
      navGrid.innerHTML = gridHtml;
      navPanelOverlay.classList.remove('hidden');
    }

    navGrid.addEventListener('click', (e) => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      const index = item.dataset.qIndex;
      if (index !== undefined) {
        currentIndex = parseInt(index);
        loadQuestion();
        navPanelOverlay.classList.add('hidden');
      }
    });

    openNavGrid.addEventListener('click', openNavPanel);
    closeNavPanel.addEventListener('click', () => {
      navPanelOverlay.classList.add('hidden');
    });

    navPanelOverlay.addEventListener('click', (e) => {
      if (e.target === navPanelOverlay) {
        navPanelOverlay.classList.add('hidden');
      }
    });

    btnMulai.addEventListener('click', () => {
      mainMenu.classList.add('hidden');
      quizScreen.classList.remove('hidden');
      currentIndex = 0;
      userAnswers.fill(-1);
      loadQuestion();
    });
  })();
</script>
</body>
</html>
