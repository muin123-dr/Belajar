<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Quiz Al-Ajurumiyah - نواسخ المبتدأ والخبر</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4f8;  /* soft light background */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      background: #ffffff;  /* white card */
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid #ffaa00;
    }

    .main-menu {
      text-align: center;
      color: #1e2b3a;  /* dark text */
      padding: 30px 16px;
    }

    .main-menu h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 4px 4px 0 #ffdd99;
      letter-spacing: 1px;
      color: #1e2b3a;
    }

    .main-menu .level-badge {
      background: #ffaa00;
      color: #1e2b3a;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 8px 20px;
      border-radius: 40px;
      display: inline-block;
      margin: 16px 0 30px;
      box-shadow: 0 8px 0 #cc8800;
      word-break: break-word;
    }

    .btn-mulai {
      background: #ffaa00;
      border: none;
      color: #1e2b3a;
      font-weight: 700;
      font-size: 2rem;
      padding: 18px 50px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 0 #cc8800, 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: all 0.1s ease;
      font-family: 'Poppins', sans-serif;
      width: 100%;
      max-width: 300px;
    }

    .btn-mulai:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #cc8800, 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .quiz-screen {
      color: #1e2b3a;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
      padding: 12px 20px;
      border-radius: 50px;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
      border: 1px solid #ffaa00;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .quiz-header .level-small {
      background: #ffaa00;
      color: #1e2b3a;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
    }

    .quiz-header .progress {
      font-size: 1rem;
      font-weight: 600;
      background: #f0f4f8;
      padding: 6px 16px;
      border-radius: 40px;
      color: #1e2b3a;
      border: 1px solid #ffaa00;
    }

    .nav-grid-btn {
      background: #fff2dd;
      border: 1px solid #ffaa00;
      color: #1e2b3a;
      font-size: 1.2rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-grid-btn:hover {
      background: #ffe4b3;
    }

    .question-box {
      background: #ffffff;
      border-radius: 28px;
      padding: 24px 18px;
      margin-bottom: 20px;
      border: 1px solid #ffaa00;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
    }

    .question-text {
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 24px;
      color: #1e2b3a;
      word-break: break-word;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-item {
      background: #f9f9f9;
      border: 2px solid #ffaa00;
      border-radius: 50px;
      padding: 14px 18px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: #1e2b3a;
      cursor: pointer;
      transition: all 0.2s;
      text-align: right;
      direction: rtl;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .option-item:hover:not(.disabled-option) {
      background: #ffeedd;
      border-color: #ffaa00;
    }

    .option-item.selected {
      background: #ffaa00;
      color: #1e2b3a;
      font-weight: 700;
      border-color: #ffaa00;
      box-shadow: 0 0 15px #ffaa00;
    }

    .disabled-option {
      pointer-events: none;
      opacity: 0.6;
    }

    .option-prefix {
      background: #cc8800;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: #ffffff;
      flex-shrink: 0;
    }

    .selected .option-prefix {
      background: #1e2b3a;
      color: #ffaa00;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #1e2b3a;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .notification-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .notification-card {
      background: #ffffff;
      border-radius: 40px;
      padding: 28px 20px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
      animation: pop 0.3s;
      border: 2px solid #ffaa00;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .notification-card.benar {
      background: #e6ffe6;
      border: 4px solid #ffaa00;
    }

    .notification-card.salah {
      background: #ffe6e6;
      border: 4px solid #ff8a80;
    }

    .notification-card.selesai {
      background: #e6f0ff;
      border: 4px solid #ffaa00;
    }

    .notif-icon {
      font-size: 4rem;
      margin-bottom: 8px;
    }

    .notif-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1e2b3a;
    }

    .notif-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notif-btn {
      border: none;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 130px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 5px 0 rgba(0,0,0,0.1);
    }

    .notif-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.1);
    }

    .btn-next {
      background: #ffaa00;
      color: #1e2b3a;
    }

    .btn-ulangi {
      background: #ff9800;
      color: #1e2b3a;
    }

    .btn-penjelasan {
      background: #2196f3;
      color: #fff;
    }

    .explanation-box {
      background: #f0f4f8;
      border-radius: 24px;
      padding: 18px;
      margin-top: 24px;
      text-align: left;
      color: #1e2b3a;
      font-size: 0.95rem;
      max-height: 300px;
      overflow-y: auto;
      border: 2px solid #ffaa00;
      direction: ltr;
    }

    .hidden {
      display: none !important;
    }

    .nav-panel-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .nav-panel {
      background: #ffffff;
      border-radius: 40px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      border: 2px solid #ffaa00;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .nav-panel h3 {
      color: #1e2b3a;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav-item {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      border: 2px solid #ffaa00;
      border-radius: 12px;
      color: #1e2b3a;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-item.answered {
      background: #cc8800;
      border-color: #ffaa00;
      color: #ffffff;
    }

    .nav-item.unanswered {
      background: #ffe6e6;
      border-color: #ff8a80;
    }

    .nav-item:hover {
      transform: scale(1.05);
      border-color: #ffaa00;
      background: #ffaa00;
      color: #1e2b3a;
    }

    .btn-tutup-panel {
      background: #ffaa00;
      border: none;
      color: #1e2b3a;
      font-weight: 700;
      padding: 12px 30px;
      border-radius: 40px;
      width: 100%;
      cursor: pointer;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div id="mainMenu" class="main-menu">
    <h1>Quiz Al-Ajurumiyah</h1>
    <div class="level-badge"><i class="fas fa-star"></i> نواسخ المبتدأ والخبر <i class="fas fa-star"></i></div>
    <button class="btn-mulai" id="btnMulai"><i class="fas fa-play"></i> Mulai</button>
    <div style="margin-top: 30px; font-size: 0.85rem; opacity: 0.7;">60 soal • berdasarkan penjelasan ulama nahwu</div>
  </div>

  <div id="quizScreen" class="quiz-screen hidden">
    <div class="quiz-header">
      <span class="level-small"><i class="fas fa-flag"></i> نواسخ</span>
      <span class="progress" id="progressIndicator">1/60</span>
      <button class="nav-grid-btn" id="openNavGrid"><i class="fas fa-th"></i></button>
    </div>
    <div class="question-box">
      <div class="question-text" id="questionText">Memuat soal...</div>
      <div class="options-container" id="optionsContainer"></div>
    </div>
    <div class="footer">— نواسخ المبتدأ والخبر - شرح المتون النحوية —</div>
  </div>
</div>

<div id="navPanelOverlay" class="nav-panel-overlay hidden">
  <div class="nav-panel">
    <h3><i class="fas fa-list"></i> Pilih Soal</h3>
    <div class="nav-grid" id="navGrid"></div>
    <button class="btn-tutup-panel" id="closeNavPanel"><i class="fas fa-times"></i> Tutup</button>
  </div>
</div>

<div id="notificationOverlay" class="notification-overlay hidden">
  <div class="notification-card" id="notificationCard">
    <div class="notif-icon" id="notifIcon">✅</div>
    <div class="notif-title" id="notifTitle">Benar</div>
    <div class="notif-buttons" id="notifButtons"></div>
    <div id="explanationArea" class="explanation-box hidden"></div>
  </div>
</div>

<script>
  (function() {
    // 60 SOAL - نواسخ المبتدأ والخبر (20 mudah, 20 sedang, 20 sulit)
    const questions = [
      // ========== MUDAH (1-20) ==========
      {
        question: "ما هي النواسخ الداخلة على المبتدأ والخبر؟",
        options: ["كان وأخواتها فقط", "إن وأخواتها فقط", "ظن وأخواتها فقط", "كان وأخواتها، وإن وأخواتها، وظن وأخواتها"],
        correct: 3,
        explanation: "النواسخ ثلاثة أنواع: كان وأخواتها (ترفع الاسم وتنصب الخبر)، وإن وأخواتها (تنصب الاسم وترفع الخبر)، وظن وأخواتها (تنصب الاسم والخبر معاً). (Nawasikh ada tiga: Kaana & saudaranya merafa'kan isim dan menasabkan khabar; Inna & saudaranya menasabkan isim dan merafa'kan khabar; Zhanna & saudaranya menasabkan keduanya.)"
      },
      {
        question: "ما عمل كان وأخواتها؟",
        options: ["ترفع الاسم وتنصب الخبر", "تنصب الاسم وترفع الخبر", "تنصب الاسم والخبر", "ترفع الاسم والخبر"],
        correct: 0,
        explanation: "كان وأخواتها ترفع المبتدأ (ويسمى اسمها) وتنصب الخبر (ويسمى خبرها)، مثل: كان زيدٌ قائماً. (Kaana merafa'kan mubtada' dan menasabkan khabar.)"
      },
      {
        question: "كم عدد أخوات إن؟",
        options: ["خمسة", "ستة", "سبعة", "ثمانية"],
        correct: 1,
        explanation: "أخوات إن ستة أدوات هي: إن، أن، لكن، كأن، ليت، لعل. (Saudara Inna ada enam.)"
      },
      {
        question: "ما معنى ليت؟",
        options: ["التوكيد", "التشبيه", "التمني", "الاستدراك"],
        correct: 2,
        explanation: "ليت للتمني، وهو طلب ما لا يرتجى حصوله أو ما يصعب حصوله. (Layta untuk tamanni, mengharapkan sesuatu yang sulit.)"
      },
      {
        question: "أي من الأفعال التالية من أخوات ظن؟",
        options: ["كان", "صار", "علمت", "ليت"],
        correct: 2,
        explanation: "علمت من أخوات ظن التي تنصب المبتدأ والخبر مفعولين لها. ('Alimtu termasuk saudara Zhanna.)"
      },
      {
        question: "ما عمل إن وأخواتها؟",
        options: ["ترفع الاسم وتنصب الخبر", "تنصب الاسم وترفع الخبر", "تنصب الاسم والخبر", "ترفع الاسم والخبر"],
        correct: 1,
        explanation: "إن وأخواتها تنصب المبتدأ (ويسمى اسمها) وترفع الخبر (ويسمى خبرها)، مثل: إن زيداً قائمٌ. (Inna menasabkan isim dan merafa'kan khabar.)"
      },
      {
        question: "ما معنى كأن؟",
        options: ["التوكيد", "التشبيه", "التمني", "الترجي"],
        correct: 1,
        explanation: "كأن للتشبيه، مثل: كأن العلمَ نورٌ. (Ka'anna untuk tasybih.)"
      },
      {
        question: "أي من هذه الأفعال من أخوات كان؟",
        options: ["ظننت", "حسبت", "أصبح", "لعل"],
        correct: 2,
        explanation: "أصبح من أخوات كان التي ترفع الاسم وتنصب الخبر. (Ashbaha saudara Kaana.)"
      },
      {
        question: "ما عمل ظن وأخواتها؟",
        options: ["ترفع الاسم وتنصب الخبر", "تنصب الاسم وترفع الخبر", "تنصب المبتدأ والخبر مفعولين لها", "ترفع الاسم والخبر"],
        correct: 2,
        explanation: "ظن وأخواتها تنصب المبتدأ والخبر على أنهما مفعولان لها. (Zhanna menasabkan mubtada' dan khabar sebagai dua maf'ul.)"
      },
      {
        question: "ما معنى لعل؟",
        options: ["التوكيد", "التشبيه", "التمني", "الترجي والتوقع"],
        correct: 3,
        explanation: "لعل للترجي والتوقع، مثل: لعل المطرَ نازلٌ. (La'alla untuk tarajji dan tawaqqu')"
      },
      {
        question: "أي من هذه الحروف للاستدراك؟",
        options: ["إن", "أن", "لكن", "ليت"],
        correct: 2,
        explanation: "لكن للاستدراك، وهي تأتي بعد كلام لنفي أو إثبات للاستدراك عليه. (Lakinna untuk istidrak.)"
      },
      {
        question: "ما إعراب 'زيد' في جملة 'كان زيدٌ قائماً'؟",
        options: ["مبتدأ مرفوع", "اسم كان مرفوع", "خبر كان منصوب", "مفعول به منصوب"],
        correct: 1,
        explanation: "زيد اسم كان مرفوع بها وعلامة رفعه الضمة. (Zaid isim Kaana marfu'.)"
      },
      {
        question: "ما إعراب 'قائماً' في جملة 'كان زيدٌ قائماً'؟",
        options: ["خبر مرفوع", "خبر كان منصوب", "مفعول به منصوب", "حال منصوب"],
        correct: 1,
        explanation: "قائماً خبر كان منصوب بها وعلامة نصبه الفتحة. (Qa'im khabar Kaana manshub.)"
      },
      {
        question: "أي من هذه الحروف يفيد التوكيد؟",
        options: ["لكن", "ليت", "إن", "لعل"],
        correct: 2,
        explanation: "إن وأن تفيدان التوكيد، مثل: إن اللهَ غفورٌ رحيمٌ. (Inna dan Anna untuk taukid.)"
      },
      {
        question: "كم عدد أخوات ظن التي ذكرها المؤلف؟",
        options: ["خمسة", "سبعة", "عشرة", "اثنا عشر"],
        correct: 2,
        explanation: "ذكر المؤلف عشرة أفعال هي: ظننت، حسبت، خلت، زعمت، رأيت، علمت، وجدت، اتخذت، جعلت، سمعت. (Sepuluh fi'il.)"
      },
      {
        question: "ما إعراب 'الله' في جملة 'إن اللهَ غفورٌ رحيمٌ'؟",
        options: ["مبتدأ مرفوع", "اسم إن منصوب", "فاعل مرفوع", "مفعول به منصوب"],
        correct: 1,
        explanation: "الله اسم إن منصوب بها وعلامة نصبه الفتحة. (Allah isim Inna manshub.)"
      },
      {
        question: "ما معنى 'أمسى' من أخوات كان؟",
        options: ["دخل في الصباح", "دخل في المساء", "دخل في الضحى", "تحول من شيء لآخر"],
        correct: 1,
        explanation: "أمسى معناه دخل في المساء، مثل: أمسى الجوُّ حاراً. (Amsa = masuk petang.)"
      },
      {
        question: "أي من هذه الأفعال ليس من أخوات كان؟",
        options: ["صار", "بات", "ظل", "ضل (بالضاد)"],
        correct: 3,
        explanation: "ضل بالضاد بمعنى الضلال ليست من أخوات كان، أما ظل بالظاء فمن أخواتها. (Dhalla (dengan dhād) bukan saudara Kaana.)"
      },
      {
        question: "ما إعراب 'الطالب' في جملة 'ليت الطالبَ ناجحٌ'؟",
        options: ["مبتدأ مرفوع", "اسم ليت منصوب", "خبر ليت مرفوع", "مفعول به منصوب"],
        correct: 1,
        explanation: "الطالب اسم ليت منصوب بها وعلامة نصبه الفتحة. (At-thalib isim Layta manshub.)"
      },
      {
        question: "ما شرط عمل 'زال' وأخواتها؟",
        options: ["أن تسبق بنفي أو شبه نفي", "أن تسبق بما المصدرية", "أن تكون بمعنى صار", "أن تكون ماضية فقط"],
        correct: 0,
        explanation: "زال وأخواتها (برح، انفك، فتي) لا تعمل إلا بشرط أن يسبقها نفي أو شبه نفي. (Zala dan saudaranya memerlukan nafi.)"
      },
      // ========== SEDANG (21-40) ==========
      {
        question: "أي الجمل التالية صحيحة من حيث عمل كان؟",
        options: ["كان زيدٌ قائمٌ", "كان زيداً قائماً", "كان زيدٌ قائماً", "كان زيداً قائمٌ"],
        correct: 2,
        explanation: "الصواب 'كان زيدٌ قائماً' لأن كان ترفع الاسم (زيدٌ) وتنصب الخبر (قائماً). (Yang benar: Kaana Zaidun qa'iman.)"
      },
      {
        question: "ما إعراب 'المسلمين' في جملة 'كان المسلمون مخلصين'؟",

      if (userAnswers[currentIndex] !== -1) {
        document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));
        answerSubmitted = true;
      } else {
        answerSubmitted = false;
      }
    }

    optionsContainer.addEventListener('click', (e) => {
      const optDiv = e.target.closest('.option-item');
      if (!optDiv) return;
      if (answerSubmitted) return;

      const idx = optDiv.dataset.optIndex;
      if (idx === undefined) return;

      answerSubmitted = true;
      const selectedIdx = parseInt(idx);
      const q = questions[currentIndex];
      const isCorrect = (selectedIdx === q.correct);

      saveAnswer(currentIndex, selectedIdx);
      document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));
      optDiv.classList.add('selected');

      if (isCorrect) {
        showCorrectNotification();
      } else {
        showWrongNotification();
      }
    });

    function showCorrectNotification() {
      notificationCard.className = 'notification-card benar';
      notifIcon.innerHTML = '✅';
      notifTitle.textContent = 'Benar!';
      notifButtons.innerHTML = `<button class="notif-btn btn-next" id="btnNext"><i class="fas fa-arrow-right"></i> Soal Berikutnya</button>`;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnNext').addEventListener('click', () => {
        hideNotification();
        moveToNextQuestion();
      });
    }

    function showWrongNotification() {
      notificationCard.className = 'notification-card salah';
      notifIcon.innerHTML = '❌';
      notifTitle.textContent = 'Salah';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangi"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-penjelasan" id="btnPenjelasan"><i class="fas fa-info-circle"></i> Penjelasan</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangi').addEventListener('click', () => {
        hideNotification();
        resetForRetry();
      });

      document.getElementById('btnPenjelasan').addEventListener('click', () => {
        if (explanationArea.classList.contains('hidden')) {
          explanationArea.innerHTML = `<strong>Analisis:</strong> ${questions[currentIndex].explanation}`;
          explanationArea.classList.remove('hidden');
        } else {
          explanationArea.classList.add('hidden');
        }
      });
    }

    function showCompletionNotification() {
      notificationCard.className = 'notification-card selesai';
      notifIcon.innerHTML = '🏆';
      notifTitle.textContent = 'Alhamdulillah sudah selesai';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangiSemua"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-level2" id="btnPelajaranBerikutnya"><i class="fas fa-arrow-right"></i> Pelajaran Berikutnya</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangiSemua').addEventListener('click', () => {
        hideNotification();
        currentIndex = 0;
        userAnswers.fill(-1);
        mainMenu.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        loadQuestion();
      });

      document.getElementById('btnPelajaranBerikutnya').addEventListener('click', () => {
        // Ganti dengan link pelajaran selanjutnya jika ada
        window.location.href = 'https://muin123-dr.github.io/Belajar/Jurumiyah/012.html';
      });
    }

    function showNotification() {
      notificationOverlay.classList.remove('hidden');
    }

    function hideNotification() {
      notificationOverlay.classList.add('hidden');
    }

    function resetForRetry() {
      userAnswers[currentIndex] = -1;
      answerSubmitted = false;
      loadQuestion();
    }

    function moveToNextQuestion() {
      if (currentIndex + 1 < questions.length) {
        currentIndex++;
        loadQuestion();
      } else {
        quizScreen.classList.add('hidden');
        showCompletionNotification();
      }
    }

    function openNavPanel() {
      let gridHtml = '';
      for (let i = 0; i < questions.length; i++) {
        const answered = userAnswers[i] !== -1;
        gridHtml += `<div class="nav-item ${answered ? 'answered' : 'unanswered'}" data-q-index="${i}">${i+1}</div>`;
      }
      navGrid.innerHTML = gridHtml;
      navPanelOverlay.classList.remove('hidden');
    }

    navGrid.addEventListener('click', (e) => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      const index = item.dataset.qIndex;
      if (index !== undefined) {
        currentIndex = parseInt(index);
        loadQuestion();
        navPanelOverlay.classList.add('hidden');
      }
    });

    openNavGrid.addEventListener('click', openNavPanel);
    closeNavPanel.addEventListener('click', () => {
      navPanelOverlay.classList.add('hidden');
    });

    navPanelOverlay.addEventListener('click', (e) => {
      if (e.target === navPanelOverlay) {
        navPanelOverlay.classList.add('hidden');
      }
    });

    btnMulai.addEventListener('click', () => {
      mainMenu.classList.add('hidden');
      quizScreen.classList.remove('hidden');
      currentIndex = 0;
      userAnswers.fill(-1);
      loadQuestion();
    });
  })();
</script>
</body>
</html>
