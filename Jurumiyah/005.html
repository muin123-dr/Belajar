<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Quiz Al-Ajurumiyah - علامات الخفض</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1B5E20, #4CAF50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .main-menu {
      text-align: center;
      color: white;
      padding: 30px 16px;
    }

    .main-menu h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 4px 4px 0 #1B5E20;
      letter-spacing: 1px;
    }

    .main-menu .level-badge {
      background: #4CAF50;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 8px 30px;
      border-radius: 40px;
      display: inline-block;
      margin: 16px 0 30px;
      box-shadow: 0 8px 0 #1B5E20;
    }

    .btn-mulai {
      background: #4CAF50;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 2rem;
      padding: 18px 50px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 0 #1B5E20, 0 8px 20px rgba(0,0,0,0.3);
      transition: all 0.1s ease;
      font-family: 'Poppins', sans-serif;
      width: 100%;
      max-width: 300px;
    }

    .btn-mulai:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #1B5E20, 0 8px 20px rgba(0,0,0,0.3);
    }

    .quiz-screen {
      color: white;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.2);
      padding: 12px 20px;
      border-radius: 50px;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
    }

    .quiz-header .level-small {
      background: #4CAF50;
      color: white;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
    }

    .quiz-header .progress {
      font-size: 1rem;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 40px;
    }

    .nav-grid-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.2rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-grid-btn:hover {
      background: rgba(255,255,255,0.4);
    }

    .question-box {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px 18px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .question-text {
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 24px;
      color: #fff5e0;
      word-break: break-word;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-item {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 14px 18px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: right;
      direction: rtl;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .option-item:hover:not(.disabled-option) {
      background: rgba(255,255,255,0.35);
      border-color: #4CAF50;
    }

    .option-item.selected {
      background: #4CAF50;
      color: white;
      font-weight: 700;
      border-color: #4CAF50;
      box-shadow: 0 0 15px #4CAF50;
    }

    .disabled-option {
      pointer-events: none;
      opacity: 0.6;
    }

    .option-prefix {
      background: #1B5E20;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: white;
      flex-shrink: 0;
    }

    .selected .option-prefix {
      background: #2e7d32;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
    }

    .notification-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .notification-card {
      background: white;
      border-radius: 40px;
      padding: 28px 20px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
      animation: pop 0.3s;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .notification-card.benar {
      background: linear-gradient(145deg, #c8e6c9, #a5d6a7);
      border: 4px solid #2e7d32;
    }

    .notification-card.salah {
      background: linear-gradient(145deg, #ffcdd2, #ef9a9a);
      border: 4px solid #b71c1c;
    }

    .notification-card.selesai {
      background: linear-gradient(145deg, #bbdefb, #90caf9);
      border: 4px solid #1565c0;
    }

    .notif-icon {
      font-size: 4rem;
      margin-bottom: 8px;
    }

    .notif-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .notif-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notif-btn {
      border: none;
      padding: 14px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      min-width: 130px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2);
    }

    .notif-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    .btn-next {
      background: #2e7d32;
      color: white;
    }

    .btn-ulangi {
      background: #ff9800;
      color: white;
    }

    .btn-penjelasan {
      background: #2196f3;
      color: white;
    }

    .explanation-box {
      background: #fff3e0;
      border-radius: 24px;
      padding: 18px;
      margin-top: 24px;
      text-align: left;
      color: #1B5E20;
      font-size: 0.95rem;
      max-height: 300px;
      overflow-y: auto;
      border: 2px solid #4CAF50;
      direction: ltr;
    }

    .hidden {
      display: none !important;
    }

    .nav-panel-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .nav-panel {
      background: #1B5E20;
      border-radius: 40px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      border: 2px solid #4CAF50;
      box-shadow: 0 20px 40px black;
    }

    .nav-panel h3 {
      color: #4CAF50;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav-item {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-item.answered {
      background: #2e7d32;
      border-color: #81c784;
    }

    .nav-item.unanswered {
      background: #b71c1c;
      border-color: #ff8a80;
    }

    .nav-item:hover {
      transform: scale(1.05);
      border-color: #4CAF50;
    }

    .btn-tutup-panel {
      background: #4CAF50;
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 30px;
      border-radius: 40px;
      width: 100%;
      cursor: pointer;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div id="mainMenu" class="main-menu">
    <h1>Quiz Al-Ajurumiyah</h1>
    <div class="level-badge"><i class="fas fa-star"></i> علامات الخفض <i class="fas fa-star"></i></div>
    <button class="btn-mulai" id="btnMulai"><i class="fas fa-play"></i> Mulai</button>
    <div style="margin-top: 30px; font-size: 0.85rem; opacity: 0.8;">60 soal pilihan ganda • berdasarkan teks Ibnu Utsaimin</div>
  </div>

  <div id="quizScreen" class="quiz-screen hidden">
    <div class="quiz-header">
      <span class="level-small"><i class="fas fa-flag"></i> علامات الخفض</span>
      <span class="progress" id="progressIndicator">1/60</span>
      <button class="nav-grid-btn" id="openNavGrid"><i class="fas fa-th"></i></button>
    </div>
    <div class="question-box">
      <div class="question-text" id="questionText">Memuat soal...</div>
      <div class="options-container" id="optionsContainer"></div>
    </div>
    <div class="footer">— ‏باب علامات الخفض لابن عثيمين ‏—</div>
  </div>
</div>

<div id="navPanelOverlay" class="nav-panel-overlay hidden">
  <div class="nav-panel">
    <h3><i class="fas fa-list"></i> Pilih Soal</h3>
    <div class="nav-grid" id="navGrid"></div>
    <button class="btn-tutup-panel" id="closeNavPanel"><i class="fas fa-times"></i> Tutup</button>
  </div>
</div>

<div id="notificationOverlay" class="notification-overlay hidden">
  <div class="notification-card" id="notificationCard">
    <div class="notif-icon" id="notifIcon">✅</div>
    <div class="notif-title" id="notifTitle">Benar</div>
    <div class="notif-buttons" id="notifButtons"></div>
    <div id="explanationArea" class="explanation-box hidden"></div>
  </div>
</div>

<script>
  (function() {
    // 60 SOAL BARU - BAB علامات الخفض
    const questions = [
      // ========== SOAL MUDAH (1-20) ==========
      {
        question: "ما عدد علامات الخفض عند النحويين؟",
        options: ["علامتان", "ثلاث علامات", "أربع علامات", "خمس علامات"],
        correct: 1,
        explanation: "الخفض له ثلاث علامات: الكسرة، والياء، والفتحة. (Khafd memiliki tiga tanda: kasrah, ya', dan fathah.)"
      },
      {
        question: "ما العلامة الأصلية للخفض؟",
        options: ["الفتحة", "الياء", "الكسرة", "حذف النون"],
        correct: 2,
        explanation: "الكسرة هي العلامة الأصلية للخفض، والياء والفتحة تنوبان عنها. (Kasrah adalah tanda asli khafd, sedangkan ya' dan fathah menggantikannya.)"
      },
      {
        question: "في أي المواضع تكون الكسرة علامة للخفض؟",
        options: ["الاسم المفرد المنصرف، جمع التكسير المنصرف، جمع المؤنث السالم", "الأسماء الخمسة، التثنية، الجمع", "الاسم الذي لا ينصرف", "الأفعال الخمسة"],
        correct: 0,
        explanation: "الكسرة تكون علامة للخفض في ثلاثة مواضع: الاسم المفرد المنصرف، جمع التكسير المنصرف، وجمع المؤنث السالم. (Kasrah menjadi tanda khafd di tiga tempat: ism mufrad munṣarif, jam' taksir munṣarif, dan jam' mu'annath sālim.)"
      },
      {
        question: "ما علامة خفض الأسماء الخمسة؟",
        options: ["الكسرة", "الياء", "الألف", "الفتحة"],
        correct: 1,
        explanation: "الأسماء الخمسة تخفض بالياء. (Isim lima dikhafd dengan ya'.)"
      },
      {
        question: "مثال على اسم مفرد منصرف يخفض بالكسرة:",
        options: ["مررت بزيدٍ", "مررت بزيدًا", "مررت بزيدُ", "مررت بزيدْ"],
        correct: 0,
        explanation: "\"بزيدٍ\" جار ومجرور، وعلامة جره الكسرة الظاهرة. (Bizaidin, tanda jarnya kasrah.)"
      },
      {
        question: "ما علامة خفض جمع المؤنث السالم؟",
        options: ["الفتحة", "الياء", "الكسرة", "الألف"],
        correct: 2,
        explanation: "جمع المؤنث السالم يخفض بالكسرة. (Jam' mu'annath sālim dikhafd dengan kasrah.)"
      },
      {
        question: "مثال على جمع مؤنث سالم مخفوض:",
        options: ["مررت بالمسلماتِ", "مررت بالمسلماتَ", "مررت بالمسلماتُ", "مررت بالمسلماتْ"],
        correct: 0,
        explanation: "\"بالمسلماتِ\" مجرور بالباء وعلامة جره الكسرة. (Bil-muslimāti, tanda jarnya kasrah.)"
      },
      {
        question: "في أي المواضع تكون الياء علامة للخفض؟",
        options: ["الاسم المفرد وجمع التكسير", "الأسماء الخمسة والتثنية والجمع", "جمع المؤنث السالم", "الفعل المضارع"],
        correct: 1,
        explanation: "الياء تكون علامة للخفض في ثلاثة مواضع: الأسماء الخمسة، التثنية، والجمع (جمع المذكر السالم). (Ya' menjadi tanda khafd di tiga tempat: isim lima, mutsanna, dan jam' mudhakkar sālim.)"
      },
      {
        question: "مثال على مثنى مخفوض:",
        options: ["مررت برجلين", "مررت برجلان", "مررت برجلون", "مررت برجلي"],
        correct: 0,
        explanation: "\"برجلين\" مجرور بالباء وعلامة جره الياء نيابة عن الكسرة. (Bi-rajulaini, tanda jarnya ya'.)"
      },
      {
        question: "ما علامة خفض جمع المذكر السالم؟",
        options: ["الكسرة", "الياء", "الفتحة", "الألف"],
        correct: 1,
        explanation: "جمع المذكر السالم يخفض بالياء. (Jam' mudhakkar sālim dikhafd dengan ya'.)"
      },
      {
        question: "مثال على جمع مذكر سالم مخفوض:",
        options: ["مررت بالمسلمين", "مررت بالمسلمون", "مررت بالمسلمات", "مررت بالمسلمي"],
        correct: 0,
        explanation: "\"بالمسلمين\" مجرور بالباء وعلامة جره الياء. (Bil-muslimīna, tanda jarnya ya'.)"
      },
      {
        question: "في أي موضع تكون الفتحة علامة للخفض؟",
        options: ["الاسم المفرد المنصرف", "جمع التكسير", "جمع المؤنث السالم", "الاسم الذي لا ينصرف"],
        correct: 3,
        explanation: "الفتحة تكون علامة للخفض في الاسم الذي لا ينصرف. (Fathah menjadi tanda khafd pada isim ghayr munṣarif.)"
      },
      {
        question: "ما هو الاسم المنصرف؟",
        options: ["ما يقبل التنوين", "ما لا يقبل التنوين", "ما كان معربًا بالحركات", "ما كان مبنيًا"],
        correct: 0,
        explanation: "المنصرف هو ما يقبل التنوين، ويجر بالكسرة. (Munṣarif adalah yang menerima tanwin dan dijar dengan kasrah.)"
      },
      {
        question: "ما هو الاسم الذي لا ينصرف؟",
        options: ["ما لا يقبل التنوين", "ما يقبل التنوين", "ما يجر بالكسرة", "ما يرفع بالضمة"],
        correct: 0,
        explanation: "الاسم الذي لا ينصرف هو ما لا يقبل التنوين ويجر بالفتحة. (Ghayr munṣarif adalah yang tidak menerima tanwin dan dijar dengan fathah.)"
      },
      {
        question: "كم عدد موانع الصرف (العلل التي تمنع الصرف)؟",
        options: ["سبع", "ثمان", "تسع", "عشر"],
        correct: 2,
        explanation: "موانع الصرف تسع علل. (Mawāni' aṣ-ṣarf ada sembilan.)"
      },
      {
        question: "مثال على اسم لا ينصرف:",
        options: ["زيد", "مساجد", "رجل", "كتاب"],
        correct: 1,
        explanation: "\"مساجد\" على وزن مفاعل، وهو صيغة منتهى الجموع، فلا ينصرف. (Masājidu tidak menerima tanwin karena shighat muntahal jumu'.)"
      },
      {
        question: "ما علامة جر الاسم الذي لا ينصرف؟",
        options: ["الكسرة", "الياء", "الفتحة", "الألف"],
        correct: 2,
        explanation: "الاسم الذي لا ينصرف يجر بالفتحة نيابة عن الكسرة. (Isim ghayr munṣarif dijar dengan fathah.)"
      },
      {
        question: "مثال على اسم لا ينصرف مجرور بالفتحة:",
        options: ["مررت بمساجدَ", "مررت بمساجدِ", "مررت بمساجدُ", "مررت بمساجدًا"],
        correct: 0,
        explanation: "\"بمساجدَ\" مجرور بالفتحة لأنه ممنوع من الصرف. (Bimasājida, tanda jarnya fathah.)"
      },
      {
        question: "أي من الأسماء التالية من الأسماء الخمسة؟",
        options: ["أب", "أخ", "حم", "كل ما سبق"],
        correct: 3,
        explanation: "الأسماء الخمسة هي: أب، أخ، حم، فو، ذو. (Isim lima: ab, akh, ham, fu, dzu.)"
      },
      {
        question: "كيف تجر كلمة \"أب\" إذا كانت من الأسماء الخمسة؟",
        options: ["بالكسرة", "بالفتحة", "بالياء", "بالألف"],
        correct: 2,
        explanation: "\"أب\" من الأسماء الخمسة، تجر بالياء، مثل: مررت بأبيك. (Ab termasuk isim lima, dijar dengan ya'.)"
      },
      // ========== SOAL SEDANG (21-40) ==========
      {
        question: "لماذا لا يجر \"مساجد\" بالكسرة في قولك: \"مررت بمساجدَ\"؟",
        options: ["لأنه جمع تكسير", "لأنه صيغة منتهى الجموع", "لأنه علم", "لأنه وصف"],
        correct: 1,
        explanation: "\"مساجد\" على وزن مفاعل، وهي صيغة منتهى الجموع، فتمنع من الصرف. (Masājidu adalah shighat muntahal jumu', sehingga mencegah sarf.)"
      },
      {
        question: "ما معنى \"صيغة منتهى الجموع\"؟",
        options: ["ما كان على وزن مفاعل أو مفاعيل", "ما كان على وزن أفعال", "ما كان على وزن فعول", "ما كان على وزن فعلان"],
        correct: 0,
        explanation: "صيغة منتهى الجموع هي ما كان على وزن مفاعل أو مفاعيل، مثل مساجد ومصابيح. (Shighat muntahal jumu' adalah bentuk jamak dengan wazan mafā'il atau mafā'īl.)"
      },
      {
        question: "مثال على اسم علم ممنوع من الصرف لوزن الفعل:",

    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(-1);
    let answerSubmitted = false;

    function saveAnswer(index, selectedIdx) {
      userAnswers[index] = selectedIdx;
    }

    function loadQuestion() {
      const q = questions[currentIndex];
      questionText.textContent = q.question;
      let optionsHtml = '';
      q.options.forEach((opt, idx) => {
        const selectedClass = (userAnswers[currentIndex] === idx) ? ' selected' : '';
        optionsHtml += `
          <div class="option-item${selectedClass}" data-opt-index="${idx}">
            <span class="option-prefix">${String.fromCharCode(65+idx)}</span>
            <span style="flex:1">${opt}</span>
          </div>
        `;
      });
      optionsContainer.innerHTML = optionsHtml;
      progressIndicator.textContent = `${currentIndex+1}/${questions.length}`;

      if (userAnswers[currentIndex] !== -1) {
        document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));
        answerSubmitted = true;
      } else {
        answerSubmitted = false;
      }
    }

    optionsContainer.addEventListener('click', (e) => {
      const optDiv = e.target.closest('.option-item');
      if (!optDiv) return;
      if (answerSubmitted) return;

      const idx = optDiv.dataset.optIndex;
      if (idx === undefined) return;

      answerSubmitted = true;
      const selectedIdx = parseInt(idx);
      const q = questions[currentIndex];
      const isCorrect = (selectedIdx === q.correct);

      saveAnswer(currentIndex, selectedIdx);
      document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled-option'));
      optDiv.classList.add('selected');

      if (isCorrect) {
        showCorrectNotification();
      } else {
        showWrongNotification();
      }
    });

    function showCorrectNotification() {
      notificationCard.className = 'notification-card benar';
      notifIcon.innerHTML = '✅';
      notifTitle.textContent = 'Benar!';
      notifButtons.innerHTML = `<button class="notif-btn btn-next" id="btnNext"><i class="fas fa-arrow-right"></i> Soal Berikutnya</button>`;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnNext').addEventListener('click', () => {
        hideNotification();
        moveToNextQuestion();
      });
    }

    function showWrongNotification() {
      notificationCard.className = 'notification-card salah';
      notifIcon.innerHTML = '❌';
      notifTitle.textContent = 'Salah';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangi"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-penjelasan" id="btnPenjelasan"><i class="fas fa-info-circle"></i> Penjelasan</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangi').addEventListener('click', () => {
        hideNotification();
        resetForRetry();
      });

      document.getElementById('btnPenjelasan').addEventListener('click', () => {
        if (explanationArea.classList.contains('hidden')) {
          explanationArea.innerHTML = `<strong>Analisis:</strong> ${questions[currentIndex].explanation}`;
          explanationArea.classList.remove('hidden');
        } else {
          explanationArea.classList.add('hidden');
        }
      });
    }

    function showCompletionNotification() {
      notificationCard.className = 'notification-card selesai';
      notifIcon.innerHTML = '🏆';
      notifTitle.textContent = 'Alhamdulillah sudah selesai';
      notifButtons.innerHTML = `
        <button class="notif-btn btn-ulangi" id="btnUlangiSemua"><i class="fas fa-redo"></i> Ulangi</button>
        <button class="notif-btn btn-level2" id="btnPelajaranBerikutnya"><i class="fas fa-arrow-right"></i> Pelajaran Berikutnya</button>
      `;
      explanationArea.classList.add('hidden');
      showNotification();

      document.getElementById('btnUlangiSemua').addEventListener('click', () => {
        hideNotification();
        currentIndex = 0;
        userAnswers.fill(-1);
        mainMenu.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        loadQuestion();
      });

      document.getElementById('btnPelajaranBerikutnya').addEventListener('click', () => {
        window.location.href = 'https://muin123-dr.github.io/Belajar/Jurumiyah/006.html';
      });
    }

    function showNotification() {
      notificationOverlay.classList.remove('hidden');
    }

    function hideNotification() {
      notificationOverlay.classList.add('hidden');
    }

    function resetForRetry() {
      userAnswers[currentIndex] = -1;
      answerSubmitted = false;
      loadQuestion();
    }

    function moveToNextQuestion() {
      if (currentIndex + 1 < questions.length) {
        currentIndex++;
        loadQuestion();
      } else {
        quizScreen.classList.add('hidden');
        showCompletionNotification();
      }
    }

    function openNavPanel() {
      let gridHtml = '';
      for (let i = 0; i < questions.length; i++) {
        const answered = userAnswers[i] !== -1;
        gridHtml += `<div class="nav-item ${answered ? 'answered' : 'unanswered'}" data-q-index="${i}">${i+1}</div>`;
      }
      navGrid.innerHTML = gridHtml;
      navPanelOverlay.classList.remove('hidden');
    }

    navGrid.addEventListener('click', (e) => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      const index = item.dataset.qIndex;
      if (index !== undefined) {
        currentIndex = parseInt(index);
        loadQuestion();
        navPanelOverlay.classList.add('hidden');
      }
    });

    openNavGrid.addEventListener('click', openNavPanel);
    closeNavPanel.addEventListener('click', () => {
      navPanelOverlay.classList.add('hidden');
    });

    navPanelOverlay.addEventListener('click', (e) => {
      if (e.target === navPanelOverlay) {
        navPanelOverlay.classList.add('hidden');
      }
    });

    btnMulai.addEventListener('click', () => {
      mainMenu.classList.add('hidden');
      quizScreen.classList.remove('hidden');
      currentIndex = 0;
      userAnswers.fill(-1);
      loadQuestion();
    });
  })();
</script>
</body>
</html>
