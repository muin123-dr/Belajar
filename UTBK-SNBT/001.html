<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi UTBK SNBT 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a3c6e;
    --accent: #e8a020;
    --accent2: #2ecc71;
    --danger: #e74c3c;
    --bg: #f0f4fb;
    --surface: #ffffff;
    --text: #1a1f36;
    --text-light: #6b7394;
    --border: #dde3f0;
    --answered: #2ecc71;
    --unanswered: #dde3f0;
    --current: #1a3c6e;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(26,60,110,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,60,110,0.18);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    padding: 5px 12px;
    border-radius: 6px;
  }
  .header-title { font-size: 16px; font-weight: 700; }
  .timer-box {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 10px;
    padding: 8px 18px;
  }
  .timer-icon { font-size: 18px; }
  #timer-display {
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    color: #fff;
    transition: color 0.3s;
  }
  #timer-display.warning { color: var(--accent); }
  #timer-display.danger { color: #ff6b6b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ===== LAYOUT ===== */
  .main-wrap {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    max-width: 1200px;
    margin: 28px auto;
    padding: 0 20px;
  }
  @media(max-width:900px){
    .main-wrap { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }

  /* ===== SIDEBAR ===== */
  .sidebar {}
  .sidebar-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }
  .sidebar-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 14px;
  }
  .section-tabs {
    display: flex; flex-direction: column; gap: 6px;
  }
  .section-tab {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text);
    transition: all 0.2s;
  }
  .section-tab.active {
    border-color: var(--primary);
    background: #e8f0fb;
    color: var(--primary);
  }
  .section-tab .badge {
    font-size: 11px;
    background: var(--border);
    border-radius: 50px;
    padding: 2px 8px;
    font-weight: 700;
  }
  .section-tab.active .badge { background: var(--primary); color: #fff; }

  .nav-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .nav-btn {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 7px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: var(--unanswered);
    color: var(--text-light);
    transition: all 0.18s;
    position: relative;
  }
  .nav-btn.answered { background: var(--answered); color: #fff; }
  .nav-btn.current { 
    background: var(--current); color: #fff; 
    box-shadow: 0 0 0 3px rgba(26,60,110,0.25);
    transform: scale(1.12);
    z-index: 1;
  }
  .nav-btn.answered.current {
    background: var(--primary);
  }

  .progress-wrap { margin-top: 10px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 600; color: var(--text-light);
    margin-bottom: 6px;
  }
  .progress-bar {
    background: var(--border); border-radius: 99px; height: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #1a3c6e, #2ecc71);
    border-radius: 99px; transition: width 0.4s ease;
  }

  /* ===== MAIN CONTENT ===== */
  .question-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 36px;
    min-height: 500px;
    display: flex;
    flex-direction: column;
  }
  .q-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 22px;
  }
  .q-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .q-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 50px;
    border: 1.5px solid var(--border); color: var(--text-light);
  }
  .q-badge.pu { border-color: #6c63ff; color: #6c63ff; }
  .q-badge.ppu { border-color: #e8a020; color: #e8a020; }
  .q-badge.pm { border-color: #2ecc71; color: #1a8a4a; }
  .q-badge.lbe { border-color: #e74c3c; color: #e74c3c; }
  .q-badge.lbi { border-color: #3498db; color: #1a6ea8; }

  .q-number-display {
    font-size: 13px; font-weight: 700; color: var(--text-light);
    white-space: nowrap;
  }

  .passage-box {
    background: #f7f9fc;
    border-left: 4px solid var(--primary);
    border-radius: 0 10px 10px 0;
    padding: 18px 22px;
    margin-bottom: 24px;
    font-family: 'Lora', serif;
    font-size: 15px;
    line-height: 1.85;
    color: #2a3050;
  }
  .passage-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text-light);
    margin-bottom: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .q-text {
    font-size: 15.5px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 28px;
    font-weight: 500;
    flex: 1;
  }
  .q-text strong { font-weight: 700; }
  .q-text .underline { text-decoration: underline; }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    text-align: left;
    line-height: 1.6;
  }
  .option:hover { border-color: var(--primary); background: #e8f0fb; }
  .option.selected {
    border-color: var(--primary);
    background: #ddeafb;
    color: var(--primary);
    font-weight: 600;
  }
  .option.correct { border-color: #2ecc71; background: #e8faf1; color: #166534; }
  .option.wrong { border-color: #e74c3c; background: #fdf0ef; color: #7f1d1d; }
  .opt-key {
    min-width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
    flex-shrink: 0;
    transition: all 0.18s;
    margin-top: 1px;
  }
  .option.selected .opt-key { background: var(--primary); color: #fff; }
  .option.correct .opt-key { background: #2ecc71; color: #fff; }
  .option.wrong .opt-key { background: #e74c3c; color: #fff; }

  .q-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 11px 24px;
    border-radius: 9px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-prev { background: var(--border); color: var(--text-light); }
  .btn-prev:hover { background: #c8d0e0; color: var(--text); }
  .btn-next { background: var(--primary); color: #fff; }
  .btn-next:hover { background: #122d55; }
  .btn-finish {
    background: linear-gradient(135deg, #e8a020, #f5c842);
    color: #fff;
    font-size: 15px;
    padding: 13px 32px;
    box-shadow: 0 4px 16px rgba(232,160,32,0.35);
  }
  .btn-finish:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,160,32,0.4); }

  /* ===== SCORE OVERLAY ===== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,25,50,0.75);
    backdrop-filter: blur(6px);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .score-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 48px 52px;
    max-width: 560px;
    width: 90%;
    text-align: center;
    animation: slideUp 0.4s ease;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .score-icon { font-size: 64px; margin-bottom: 16px; }
  .score-title { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
  .score-subtitle { color: var(--text-light); font-size: 14px; margin-bottom: 32px; }
  .score-big {
    font-size: 88px; font-weight: 800;
    background: linear-gradient(135deg, var(--primary), #3a7bd5);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 8px;
  }
  .score-max { font-size: 15px; color: var(--text-light); margin-bottom: 28px; }
  .score-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; margin-bottom: 32px;
  }
  .stat-box {
    background: var(--bg);
    border-radius: 12px;
    padding: 16px 10px;
  }
  .stat-num { font-size: 26px; font-weight: 800; }
  .stat-num.correct { color: #2ecc71; }
  .stat-num.wrong { color: #e74c3c; }
  .stat-num.skip { color: var(--text-light); }
  .stat-label { font-size: 12px; color: var(--text-light); font-weight: 600; margin-top: 2px; }

  .section-scores {
    text-align: left; margin-bottom: 32px;
  }
  .section-score-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 8px;
    font-size: 14px; font-weight: 600;
  }
  .section-score-val { font-weight: 800; color: var(--primary); }

  .btn-analysis {
    width: 100%; background: linear-gradient(135deg, #1a3c6e, #3a7bd5);
    color: #fff; border: none; border-radius: 12px;
    padding: 16px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .btn-analysis:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,60,110,0.3); }
  .btn-retry {
    width: 100%; background: var(--border); color: var(--text);
    border: none; border-radius: 12px; padding: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn-retry:hover { background: #c8d0e0; }

  /* ===== ANALYSIS OVERLAY ===== */
  .analysis-overlay {
    position: fixed; inset: 0;
    background: rgba(15,25,50,0.82);
    backdrop-filter: blur(6px);
    z-index: 1000;
    overflow-y: auto;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  .analysis-container {
    background: var(--surface);
    border-radius: 20px;
    max-width: 820px;
    width: 100%;
    overflow: hidden;
  }
  .analysis-header {
    background: var(--primary);
    color: #fff;
    padding: 28px 36px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .analysis-header h2 { font-size: 20px; font-weight: 800; }
  .btn-close {
    background: rgba(255,255,255,0.15);
    border: none; color: #fff; cursor: pointer;
    border-radius: 8px; padding: 8px 16px;
    font-family: inherit; font-size: 14px; font-weight: 700;
    transition: all 0.2s;
  }
  .btn-close:hover { background: rgba(255,255,255,0.25); }

  .analysis-body { padding: 24px 32px; }

  .analysis-item {
    border: 1.5px solid var(--border);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .analysis-item.correct-item { border-color: #2ecc71; }
  .analysis-item.wrong-item { border-color: #e74c3c; }
  .analysis-item.skip-item { border-color: var(--border); }

  .analysis-toggle {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 22px;
    cursor: pointer;
    background: transparent;
    user-select: none;
  }
  .analysis-toggle:hover { background: var(--bg); }
  .a-toggle-left { display: flex; align-items: center; gap: 12px; }
  .a-num { font-size: 13px; font-weight: 800; color: var(--text-light); min-width: 24px; }
  .a-qtext { font-size: 14px; font-weight: 600; line-height: 1.4; max-width: 500px; }
  .a-status {
    font-size: 11px; font-weight: 800; letter-spacing: 0.8px;
    padding: 4px 12px; border-radius: 50px;
    text-transform: uppercase;
  }
  .a-status.correct { background: #e8faf1; color: #166534; }
  .a-status.wrong { background: #fdf0ef; color: #7f1d1d; }
  .a-status.skip { background: var(--bg); color: var(--text-light); }
  .a-arrow { font-size: 16px; color: var(--text-light); transition: transform 0.3s; }
  .analysis-item.open .a-arrow { transform: rotate(180deg); }

  .analysis-content {
    display: none;
    padding: 0 22px 22px;
    border-top: 1px solid var(--border);
  }
  .analysis-item.open .analysis-content { display: block; }
  .a-your-answer { font-size: 13px; margin: 14px 0 8px; color: var(--text-light); font-weight: 600; }
  .a-correct-answer { font-size: 13px; margin-bottom: 14px; color: #166534; font-weight: 600; }
  .a-explanation {
    background: #f7f9fc;
    border-left: 3px solid var(--primary);
    padding: 14px 18px;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    line-height: 1.75;
    color: #2a3050;
  }
  .a-explanation strong { color: var(--primary); }

  /* ===== MATH UTILS ===== */
  .math-inline { font-style: italic; }
  sub { font-size: 11px; }
  sup { font-size: 11px; }

  /* ===== TABLE ===== */
  .data-table {
    width: 100%; border-collapse: collapse;
    font-size: 13.5px; margin: 14px 0;
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .data-table th {
    background: var(--primary); color: #fff;
    padding: 10px 14px; text-align: left; font-weight: 700; font-size: 13px;
  }
  .data-table td {
    padding: 9px 14px; border-bottom: 1px solid var(--border);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:nth-child(even) td { background: var(--bg); }

  /* mobile */
  @media(max-width:600px){
    .question-card { padding: 20px 16px; }
    .score-card { padding: 32px 22px; }
    .score-big { font-size: 64px; }
    .analysis-body { padding: 16px; }
    .header { padding: 0 16px; }
    .header-title { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-badge">SNBT</div>
    <div class="header-title">Simulasi UTBK SNBT 2025</div>
  </div>
  <div class="timer-box">
    <span class="timer-icon">⏱</span>
    <span id="timer-display">180:00</span>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <!-- QUESTION AREA -->
  <div>
    <div class="question-card" id="question-card">
      <!-- filled by JS -->
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;">
      <button class="btn btn-finish" onclick="finishExam()">⚑ Selesai &amp; Lihat Nilai</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">Subtes</div>
      <div class="section-tabs" id="section-tabs">
        <!-- filled by JS -->
      </div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-title">Navigasi Soal</div>
      <div class="nav-grid" id="nav-grid"><!-- filled by JS --></div>
      <div class="progress-wrap" style="margin-top:16px;">
        <div class="progress-label">
          <span>Progres</span>
          <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- SCORE OVERLAY -->
<div class="overlay" id="score-overlay" style="display:none;">
  <div class="score-card">
    <div class="score-icon" id="score-icon">🎯</div>
    <div class="score-title">Hasil Ujian</div>
    <div class="score-subtitle">Simulasi UTBK SNBT 2025</div>
    <div class="score-big" id="score-big">0</div>
    <div class="score-max">dari 1000 (skor UTBK)</div>
    <div class="score-stats">
      <div class="stat-box"><div class="stat-num correct" id="stat-correct">0</div><div class="stat-label">Benar</div></div>
      <div class="stat-box"><div class="stat-num wrong" id="stat-wrong">0</div><div class="stat-label">Salah</div></div>
      <div class="stat-box"><div class="stat-num skip" id="stat-skip">0</div><div class="stat-label">Kosong</div></div>
    </div>
    <div class="section-scores" id="section-scores-detail"></div>
    <button class="btn-analysis" onclick="showAnalysis()">📊 Lihat Analisis &amp; Pembahasan</button>
    <button class="btn-retry" onclick="retryExam()">🔄 Ulangi Ujian</button>
  </div>
</div>

<!-- ANALYSIS OVERLAY -->
<div class="analysis-overlay" id="analysis-overlay" style="display:none;">
  <div class="analysis-container">
    <div class="analysis-header">
      <h2>📊 Analisis &amp; Pembahasan Jawaban</h2>
      <button class="btn-close" onclick="closeAnalysis()">✕ Tutup</button>
    </div>
    <div class="analysis-body" id="analysis-body">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<script>
// =============================================
// DATA SOAL UTBK SNBT 2025
// =============================================

const sections = [
  { id: 'pu', name: 'Penalaran Umum', abbr: 'PU', count: 30 },
  { id: 'ppu', name: 'Penget. & Pem. Umum', abbr: 'PPU', count: 20 },
  { id: 'pm', name: 'Penalaran Matematika', abbr: 'PM', count: 20 },
  { id: 'lbe', name: 'Literasi Bhs. Indonesia', abbr: 'LBE', count: 20 },
  { id: 'lbi', name: 'Literasi Bhs. Inggris', abbr: 'LBI', count: 20 },
];

const questions = [

// ============================================================
// PENALARAN UMUM (30 soal) — No. 1–30
// ============================================================

// --- Kelompok Bacaan 1: Ekonomi Digital (PU 1-5)
{
  section: 'pu',
  passage: `Revolusi digital telah mengubah lanskap ekonomi global secara fundamental. Di Indonesia, pertumbuhan e-commerce mencapai 40% per tahun selama lima tahun terakhir, menjadikannya pasar digital terbesar di Asia Tenggara. Namun, pertumbuhan ini tidak merata: 72% transaksi digital terkonsentrasi di Pulau Jawa, sementara wilayah Indonesia Timur hanya menyumbang 8%. Kesenjangan ini disebabkan oleh infrastruktur internet yang belum merata, literasi digital yang rendah, dan keterbatasan akses logistik di daerah terpencil.\n\nPemerintah merespons dengan program "Digital Nusantara" yang mengalokasikan Rp 15 triliun untuk pembangunan infrastruktur digital di luar Jawa. Pakar ekonomi menilai program ini perlu didukung pelatihan SDM dan pembangunan ekosistem UMKM digital secara menyeluruh agar dampaknya maksimal.`,
  passageTitle: 'Bacaan 1 (untuk soal 1–5)',
  question: 'Berdasarkan teks, manakah pernyataan berikut yang PALING TEPAT menggambarkan kondisi ekonomi digital Indonesia?',
  options: [
    'Pertumbuhan e-commerce Indonesia merata di seluruh wilayah Indonesia',
    'Indonesia merupakan pasar digital terbesar di Asia Tenggara meski masih menghadapi kesenjangan antar-wilayah',
    'Program Digital Nusantara dinilai cukup oleh para pakar untuk mengatasi kesenjangan digital',
    'Infrastruktur internet di Indonesia Timur sudah baik namun belum dimanfaatkan secara optimal',
    'Literasi digital bukan faktor utama kesenjangan pertumbuhan e-commerce',

// =============================================
// STATE
// =============================================
let currentIndex = 0;
let answers = new Array(questions.length).fill(null);
let timerInterval = null;
let timeLeft = 180 * 60; // seconds
let examFinished = false;

// =============================================
// INIT
// =============================================
function init() {
  renderSectionTabs();
  renderNavGrid();
  renderQuestion(currentIndex);
  startTimer();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      finishExam(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const el = document.getElementById('timer-display');
  el.textContent = `${String(m).padStart(3,'0')}:${String(s).padStart(2,'0')}`;
  el.className = '';
  if (timeLeft <= 600) el.classList.add('danger');
  else if (timeLeft <= 1800) el.classList.add('warning');
}

// =============================================
// RENDER SECTION TABS
// =============================================
function renderSectionTabs() {
  const container = document.getElementById('section-tabs');
  container.innerHTML = sections.map((sec, si) => {
    const startIdx = sections.slice(0, si).reduce((a,s) => a+s.count, 0);
    const sectionQ = questions.filter(q => q.section === sec.id);
    const answered = sectionQ.filter((q, qi) => answers[startIdx + qi] !== null).length;
    return `<button class="section-tab ${si===getCurrentSection()?'active':''}" onclick="jumpToSection(${si})">
      <span>${sec.abbr}</span>
      <span class="badge">${answered}/${sec.count}</span>
    </button>`;
  }).join('');
}

function getCurrentSection() {
  let idx = 0;
  for (let i = 0; i < sections.length; i++) {
    idx += sections[i].count;
    if (currentIndex < idx) return i;
  }
  return sections.length - 1;
}

function jumpToSection(si) {
  const startIdx = sections.slice(0, si).reduce((a,s) => a+s.count, 0);
  currentIndex = startIdx;
  renderQuestion(currentIndex);
  renderNavGrid();
  renderSectionTabs();
}

// =============================================
// RENDER NAV GRID
// =============================================
function renderNavGrid() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = questions.map((q, i) => {
    let cls = 'nav-btn';
    if (answers[i] !== null) cls += ' answered';
    if (i === currentIndex) cls += ' current';
    return `<button class="${cls}" onclick="goToQuestion(${i})">${i+1}</button>`;
  }).join('');
  updateProgress();
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const total = questions.length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(answered/total)*100}%`;
}

// =============================================
// RENDER QUESTION
// =============================================
function renderQuestion(idx) {
  const q = questions[idx];
  const card = document.getElementById('question-card');

  // Section badge class
  const badgeClass = q.section;
  const secName = sections.find(s=>s.id===q.section)?.name || '';

  let passageHTML = '';
  if (q.passage) {
    passageHTML = `<div class="passage-box">
      ${q.passageTitle ? `<div class="passage-title">${q.passageTitle}</div>` : ''}
      ${q.passage.replace(/\n/g,'<br>')}
    </div>`;
  } else if (q.passageTitle) {
    // No new passage but has title (continuation)
    passageHTML = `<div style="font-size:12px;color:var(--text-light);font-weight:600;margin-bottom:12px;letter-spacing:0.8px;">[Lanjutan dari bacaan yang sama]</div>`;
  }

  card.innerHTML = `
    <div class="q-header">
      <div class="q-meta">
        <span class="q-badge ${badgeClass}">${secName}</span>
      </div>
      <div class="q-number-display">Soal ${idx+1} dari ${questions.length}</div>
    </div>
    ${passageHTML}
    <div class="q-text">${q.question.replace(/\n/g,'<br>')}</div>
    <div class="options" id="options-container">
      ${q.options.map((opt, oi) => {
        let cls = 'option';
        if (answers[idx] === oi) cls += ' selected';
        const keys = ['A','B','C','D','E'];
        return `<button class="${cls}" onclick="selectAnswer(${idx}, ${oi})">
          <span class="opt-key">${keys[oi]}</span>
          <span>${opt}</span>
        </button>`;
      }).join('')}
    </div>
    <div class="q-actions">
      <button class="btn btn-prev" onclick="navigate(-1)" ${idx===0?'disabled':''}>← Sebelumnya</button>
      <button class="btn btn-next" onclick="navigate(1)" ${idx===questions.length-1?'disabled':''}>Selanjutnya →</button>
    </div>
  `;
}

function selectAnswer(qIdx, optIdx) {
  if (examFinished) return;
  answers[qIdx] = optIdx;
  renderQuestion(qIdx);
  renderNavGrid();
  renderSectionTabs();
}

function navigate(dir) {
  const newIdx = currentIndex + dir;
  if (newIdx >= 0 && newIdx < questions.length) {
    currentIndex = newIdx;
    renderQuestion(currentIndex);
    renderNavGrid();
    renderSectionTabs();
  }
}

function goToQuestion(idx) {
  currentIndex = idx;
  renderQuestion(currentIndex);
  renderNavGrid();
  renderSectionTabs();
}

// =============================================
// FINISH EXAM
// =============================================
function finishExam(auto = false) {
  if (examFinished) return;
  examFinished = true;
  clearInterval(timerInterval);

  let correct = 0, wrong = 0, skip = 0;
  questions.forEach((q, i) => {
    if (answers[i] === null) skip++;
    else if (answers[i] === q.answer) correct++;
    else wrong++;
  });

  const rawScore = correct / questions.length;
  const utbkScore = Math.round(200 + rawScore * 800);

  document.getElementById('score-big').textContent = utbkScore;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;

  const icon = utbkScore >= 700 ? '🏆' : utbkScore >= 550 ? '🎯' : utbkScore >= 400 ? '📚' : '💪';
  document.getElementById('score-icon').textContent = icon;

  // Per-section
  let sHTML = '<div class="sidebar-title" style="margin-bottom:12px;">Skor Per Subtes</div>';
  sections.forEach((sec, si) => {
    const startIdx = sections.slice(0, si).reduce((a, s) => a + s.count, 0);
    let c = 0;
    for (let i = startIdx; i < startIdx + sec.count; i++) {
      if (answers[i] === questions[i].answer) c++;
    }
    const pct = Math.round((c / sec.count) * 100);
    sHTML += `<div class="section-score-row">
      <span>${sec.abbr}</span>
      <span class="section-score-val">${c}/${sec.count} (${pct}%)</span>
    </div>`;
  });
  document.getElementById('section-scores-detail').innerHTML = sHTML;

  document.getElementById('score-overlay').style.display = 'flex';
}

// =============================================
// ANALYSIS
// =============================================
function showAnalysis() {
  const body = document.getElementById('analysis-body');
  const keys = ['A','B','C','D','E'];

  body.innerHTML = questions.map((q, i) => {
    const userAns = answers[i];
    const isCorrect = userAns === q.answer;
    const isSkip = userAns === null;

    let statusClass = isSkip ? 'skip' : isCorrect ? 'correct' : 'wrong';
    let statusLabel = isSkip ? 'Tidak Dijawab' : isCorrect ? 'Benar' : 'Salah';

    const qShort = q.question.length > 80 ? q.question.substring(0,80)+'...' : q.question;

    const yourAns = isSkip ? 'Tidak dijawab' : `${keys[userAns]}. ${q.options[userAns]}`;
    const correctAns = `${keys[q.answer]}. ${q.options[q.answer]}`;

    return `<div class="analysis-item ${statusClass}-item" id="ai-${i}">
      <div class="analysis-toggle" onclick="toggleAnalysis(${i})">
        <div class="a-toggle-left">
          <span class="a-num">${i+1}</span>
          <span class="a-qtext">${qShort.replace(/\n/g,' ')}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
          <span class="a-status ${statusClass}">${statusLabel}</span>
          <span class="a-arrow">▼</span>
        </div>
      </div>
      <div class="analysis-content">
        <div class="a-your-answer">Jawaban kamu: <strong>${yourAns}</strong></div>
        <div class="a-correct-answer">✅ Jawaban benar: <strong>${correctAns}</strong></div>
        <div class="a-explanation"><strong>Pembahasan:</strong><br>${q.explanation}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('analysis-overlay').style.display = 'flex';
}

function toggleAnalysis(i) {
  const item = document.getElementById(`ai-${i}`);
  item.classList.toggle('open');
}

function closeAnalysis() {
  document.getElementById('analysis-overlay').style.display = 'none';
}

function retryExam() {
  answers = new Array(questions.length).fill(null);
  currentIndex = 0;
  examFinished = false;
  timeLeft = 180 * 60;
  document.getElementById('score-overlay').style.display = 'none';
  document.getElementById('analysis-overlay').style.display = 'none';
  renderSectionTabs();
  renderNavGrid();
  renderQuestion(0);
  startTimer();
}

// =============================================
// START
// =============================================
init();
</script>
</body>
</html>
